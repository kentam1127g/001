backend:
  name: github
  repo: kentam1127g/001
  branch: main
  base_url: https://enpitumark-oath.netlify.app

media_folder: "images/uploads"
public_folder: "/images/uploads"

publish_mode: simple

collections:
  - name: "posts"
    label: "Posts"
    label_singular: "Post"
    folder: "content/posts"
    create: true
    delete: true
    extension: "json"
    format: "json"
    slug: "{{slug}}"
    identifier_field: "id"
    summary: "{{author}}"

    fields:
      - label: "投稿者"
        name: "author"
        widget: "select"
        options: ["A", "B"]

      - label: "画像"
        name: "image"
        widget: "image"
        required: false

      - label: "テキスト"
        name: "text"
        widget: "text"
        required: false

      - label: "画像キャプション"
        name: "caption"
        widget: "string"
        required: false