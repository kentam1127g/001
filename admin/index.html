<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin</title>
  <link href="config.yml" type="text/yaml" rel="cms-config-url" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    const AUTHOR_MAP = {
      "kentam1127g": "まつけん",
      "wakako38-dev": "わかこ"
    };

    function getGithubLogin() {
      try {
        const raw = localStorage.getItem("decap-cms-user");
        if (!raw) return "";
        const user = JSON.parse(raw);
        return user?.login || "";
      } catch (e) {
        console.error("failed to read decap-cms-user:", e);
        return "";
      }
    }

    function pad(num) {
      return String(num).padStart(2, "0");
    }

    function getJSTNowParts() {
      const now = new Date();

      const formatter = new Intl.DateTimeFormat("sv-SE", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });

      const parts = formatter.formatToParts(now);
      const map = Object.fromEntries(
        parts
          .filter(part => part.type !== "literal")
          .map(part => [part.type, part.value])
      );

      return {
        year: map.year,
        month: map.month,
        day: map.day,
        hour: map.hour,
        minute: map.minute,
        second: map.second
      };
    }

    function getJSTDate() {
      const p = getJSTNowParts();
      return `${p.year}-${p.month}-${p.day}`;
    }

    function getJSTISOString() {
      const p = getJSTNowParts();
      return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}+09:00`;
    }

    CMS.registerEventListener({
      name: "preSave",
      handler: ({ entry }) => {
        try {
          const login = getGithubLogin();
          const author = AUTHOR_MAP[login] || "";
          const nowDate = getJSTDate();
          const nowCreatedAt = getJSTISOString();

          let data = entry.get("data");

          const currentCreatedAt = data.get("createdAt");
          const currentDate = data.get("date");

          data = data.set("author", author);

          // createdAt は未設定なら初回だけ入れる
          if (!currentCreatedAt) {
            data = data.set("createdAt", nowCreatedAt);
          }

          // date は未設定なら createdAt 由来、なければ今日
          if (!currentDate) {
            const baseDate = currentCreatedAt
              ? String(currentCreatedAt).slice(0, 10)
              : nowDate;
            data = data.set("date", baseDate);
          }

          return entry.set("data", data);
        } catch (e) {
          console.error("preSave failed:", e);
          return entry;
        }
      }
    });
  </script>
</body>
</html>
