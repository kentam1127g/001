<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin</title>
  <link href="config.yml" type="text/yaml" rel="cms-config-url" />
  <style>
    .nc-root{
      width: 100vw!important;
    }
    .e1t18l343{
      display: 0px!important;
    }
    .css-kg0ufi-CollectionMain{
      width: 100vw!important;
      padding-left: none!important;
    }
    @media (max-width: 768px) {
      html, body { overflow-x: hidden; }
      #nc-root, #nc-root > div {
        max-width: 100vw !important;
        overflow-x: hidden;
      }
    }
  </style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    const AUTHOR_MAP = {
      "kentam1127g": "まつけん",
      "wakako38-dev": "わかこ"
    };

    function getGithubLogin() {
      try {
        const raw = localStorage.getItem("decap-cms-user");
        if (!raw) return "";
        const user = JSON.parse(raw);
        return user?.login || "";
      } catch (e) {
        console.error("failed to read decap-cms-user:", e);
        return "";
      }
    }

    function getJSTNowParts() {
      const now = new Date();

      const formatter = new Intl.DateTimeFormat("sv-SE", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });

      const parts = formatter.formatToParts(now);
      const map = Object.fromEntries(
        parts
          .filter(part => part.type !== "literal")
          .map(part => [part.type, part.value])
      );

      return {
        year: map.year,
        month: map.month,
        day: map.day,
        hour: map.hour,
        minute: map.minute,
        second: map.second
      };
    }

    function getJSTDate() {
      const p = getJSTNowParts();
      return `${p.year}-${p.month}-${p.day}`;
    }

    function getJSTISOString() {
      const p = getJSTNowParts();
      return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}+09:00`;
    }

    function isInvalidAutoValue(value) {
      if (value == null) return true;
      const s = String(value).trim();
      return !s || s === "{{now}}" || s === "Invalid Date";
    }

    // ── カスタムプレビュー ──────────────────────────────────────────
    CMS.registerPreviewStyle(`
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 20px;
        background: #e8e8e8;
        font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", "MS Gothic", sans-serif;
        line-height: 1.7;
        color: #000;
      }
      .bubble {
        background: #fff;
        border: 2px solid #000;
        padding: 14px;
        max-width: 460px;
        margin: 0 auto;
      }
      .stamp {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        color: #444;
        font-size: 0.78rem;
        margin-bottom: 10px;
      }
      .author {
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.82rem;
      }
      .entry-media {
        border: 2px solid #000;
        background: #ddd;
        margin-bottom: 10px;
      }
      .entry-media img {
        display: block;
        width: 100%;
      }
      .entry-text {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.98rem;
      }
    `, { raw: true });

    const PostPreview = ({ entry, getAsset }) => {
      const author = entry.getIn(['data', 'author']) || '';
      const text = entry.getIn(['data', 'text']) || '';
      const image = entry.getIn(['data', 'image']) || '';
      const createdAt = entry.getIn(['data', 'createdAt']) || '';

      let timeStr = '';
      if (createdAt) {
        const d = new Date(createdAt);
        if (!isNaN(d.getTime())) {
          let hr = d.getHours();
          const label = hr < 12 ? '午前' : '午後';
          hr = hr % 12 || 12;
          timeStr = `${label}${hr}時`;
        }
      }

      const asset = image ? getAsset(image) : null;
      const imageUrl = asset ? (asset.url || asset.toString()) : null;

      return h('div', null,
        h('article', { className: 'bubble' },
          h('div', { className: 'stamp' },
            h('span', { className: 'author' }, author),
            h('span', null, timeStr)
          ),
          imageUrl
            ? h('div', { className: 'entry-media' },
                h('img', { src: imageUrl, alt: '' })
              )
            : null,
          text ? h('p', { className: 'entry-text' }, text) : null
        )
      );
    };

    CMS.registerPreviewTemplate('posts', PostPreview);
    // ────────────────────────────────────────────────────────────────

    CMS.registerEventListener({
      name: "preSave",
      handler: ({ entry }) => {
        try {
          const login = getGithubLogin();
          const author = AUTHOR_MAP[login] || "";
          const nowDate = getJSTDate();
          const nowCreatedAt = getJSTISOString();

          let data = entry.get("data");

          const currentAuthor = data.get("author");
          const currentDate = data.get("date");
          const currentCreatedAt = data.get("createdAt");

          data = data.set("author", author || currentAuthor || "");

          if (isInvalidAutoValue(currentCreatedAt)) {
            data = data.set("createdAt", nowCreatedAt);
          }

          const finalCreatedAt = data.get("createdAt");

          if (isInvalidAutoValue(currentDate)) {
            const derivedDate =
              typeof finalCreatedAt === "string" && finalCreatedAt.length >= 10
                ? finalCreatedAt.slice(0, 10)
                : nowDate;

            data = data.set("date", derivedDate);
          }

          return entry.set("data", data);
        } catch (e) {
          console.error("preSave failed:", e);
          return entry;
        }
      }
    });
  </script>

  <script>
    // ── SP レイアウトパッチ ──────────────────────────────────────────
    if (window.matchMedia('(max-width: 768px)').matches) {

      // 指定要素を含む「横並びflex/gridコンテナ」を見つけ、
      // その要素を含むペインを非表示にして反対側を全幅にする
      function hidePaneContaining(anchor) {
        let node = anchor.parentElement;
        while (node && node.id !== 'nc-root') {
          const parent = node.parentElement;
          if (!parent || parent.id === 'nc-root') break;
          const cs = getComputedStyle(parent);
          const sideBySide =
            (cs.display === 'flex' && cs.flexDirection !== 'column') ||
            (cs.display === 'grid' && cs.gridTemplateColumns.trim().split(/\s+/).length > 1);
          if (sideBySide && parent.children.length >= 2) {
            const hidePane = [...parent.children].find(c => c.contains(anchor));
            const showPane = [...parent.children].find(c => c !== hidePane);
            if (hidePane && showPane && !hidePane.dataset.spHidden) {
              hidePane.dataset.spHidden = '1';
              hidePane.style.setProperty('display', 'none', 'important');
              showPane.style.setProperty('width', '100vw', 'important');
              showPane.style.setProperty('max-width', '100vw', 'important');
              parent.style.setProperty('grid-template-columns', '1fr', 'important');
              parent.style.setProperty('flex-direction', 'column', 'important');
            }
            return;
          }
          node = parent;
        }
      }

      let rafId = null;
      const observer = new MutationObserver(() => {
        if (rafId) return;
        rafId = requestAnimationFrame(() => {
          rafId = null;
          const root = document.getElementById('nc-root');
          if (!root) return;

          // 一覧画面: "Collections" テキストのみを持つ要素を探してサイドバーを隠す
          const collectionsLabel = [...root.querySelectorAll('*')]
            .find(el => !el.children.length && el.textContent.trim() === 'Collections');
          if (collectionsLabel) hidePaneContaining(collectionsLabel);

          // 編集画面: プレビューiframeを含むペインを隠す
          const iframe = root.querySelector('iframe');
          if (iframe && !iframe.dataset.spPatched) {
            iframe.dataset.spPatched = '1';
            hidePaneContaining(iframe);
          }
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });
    }
    // ────────────────────────────────────────────────────────────────
  </script>
</body>
</html>
