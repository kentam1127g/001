<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin</title>
  <link href="config.yml" type="text/yaml" rel="cms-config-url" />
  <style>
  :root {
    --sp-breakpoint: 768px;
  }

  html,
  body {
    margin: 0;
    padding: 0;
  }

  body {
    font-family: sans-serif !important;
  }

  /* 基本レイアウトの横はみ出し防止 */
  *,
  *::before,
  *::after {
    box-sizing: border-box;
  }

  /* Decap CMS 全体 */
  #nc-root,
  #nc-root > div,
  .nc-root,
  .css-1y2l20x-CardsGrid,
  .css-1y2l20x-CardsGri,
  .css-kg0ufi-CollectionMain {
    max-width: 100%;
    box-sizing: border-box !important;
  }

  /* 不要要素を非表示 */
  .e1t18l343,.e1d2l9mo14,.e1d2l9mo11,.e1d2l9mo12,.e1d2l9mo13,.e1d2l9mo19 {
    display: none !important;
  }

  .css-1gn4qo4-ToolbarSectionMain-toolbarSection-toolbarSection{
    justify-content: flex-end!important;
  }

  .css-oi4kwk-ImageWrapper-checkerboard-checkerboard{
    width: 100%!important;
  }

  /* ヘッダー幅の typo 修正版 */
  .css-y5bbau-AppHeaderContent {
    min-width: 100px !important;
    max-width: 100%;
  }

  /* コレクションメイン領域 */
  .css-kg0ufi-CollectionMain {
    width: 100% !important;
    padding-left: 0 !important;
  }

  @media (max-width: 768px) {
    html,
    body {
      width: 100%;
      max-width: 100%;
      overflow-x: hidden !important;
    }

    #nc-root,
    #nc-root > div,
    .nc-root {
      width: 100% !important;
      max-width: 100% !important;
      overflow-x: hidden !important;
    }

    /* カード一覧やメイン領域をスマホ幅に収める */
    .css-1y2l20x-CardsGri,
    .css-kg0ufi-CollectionMain {
      width: 100% !important;
      max-width: 100% !important;
      min-width: 0 !important;
      padding-left: 0 !important;
      padding-right: 0 !important;
    }

    /* フレックスやグリッド配下での横はみ出し防止 */
    #nc-root * {
      min-width: 0;
    }

    /* 入力欄やボタン類を画面内に収める */
    input,
    textarea,
    select,
    button {
      max-width: 100% !important;
      font-size: 16px;
    }

    /* 画像・iframeのはみ出し防止 */
    img,
    iframe,
    video,
    canvas,
    svg {
      max-width: 100% !important;
      height: auto;
    }

    /* モーダル全体 */
    [role="dialog"],
    [role="presentation"] {
      width: 100% !important;
      max-width: 100% !important;
      left: 0 !important;
      right: 0 !important;
      margin: 0 !important;
      box-sizing: border-box !important;
      overflow-x: hidden !important;
    }

    /* モーダル内部 */
    [role="presentation"] * {
      max-width: 100% !important;
      min-width: 0 !important;
      box-sizing: border-box !important;
    }

    /* モーダル内の横並び崩し対策 */
    [role="dialog"] .css-1y2l20x-CardsGrid,
    [role="presentation"] .css-1y2l20x-CardsGrid,
    [role="dialog"] [style*="display: flex"],
    [role="presentation"] [style*="display: flex"] {
      flex-wrap: wrap !important;
    }
  }
</style>
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    const AUTHOR_MAP = {
      "kentam1127g": "まつけん",
      "wakako38-dev": "わかこ"
    };

    function getGithubLogin() {
      try {
        const raw = localStorage.getItem("decap-cms-user");
        if (!raw) return "";
        const user = JSON.parse(raw);
        return user?.login || "";
      } catch (e) {
        console.error("failed to read decap-cms-user:", e);
        return "";
      }
    }

    function getJSTNowParts() {
      const now = new Date();

      const formatter = new Intl.DateTimeFormat("sv-SE", {
        timeZone: "Asia/Tokyo",
        year: "numeric",
        month: "2-digit",
        day: "2-digit",
        hour: "2-digit",
        minute: "2-digit",
        second: "2-digit",
        hour12: false
      });

      const parts = formatter.formatToParts(now);
      const map = Object.fromEntries(
        parts
          .filter(part => part.type !== "literal")
          .map(part => [part.type, part.value])
      );

      return {
        year: map.year,
        month: map.month,
        day: map.day,
        hour: map.hour,
        minute: map.minute,
        second: map.second
      };
    }

    function getJSTDate() {
      const p = getJSTNowParts();
      return `${p.year}-${p.month}-${p.day}`;
    }

    function getJSTISOString() {
      const p = getJSTNowParts();
      return `${p.year}-${p.month}-${p.day}T${p.hour}:${p.minute}:${p.second}+09:00`;
    }

    function isInvalidAutoValue(value) {
      if (value == null) return true;
      const s = String(value).trim();
      return !s || s === "{{now}}" || s === "Invalid Date";
    }

    // ── カスタムプレビュー ──────────────────────────────────────────
    CMS.registerPreviewStyle(`
      * { box-sizing: border-box; }
      body {
        margin: 0;
        padding: 20px;
        background: #e8e8e8;
        font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", "MS Gothic", sans-serif;
        line-height: 1.7;
        color: #000;
      }
      .bubble {
        background: #fff;
        border: 2px solid #000;
        padding: 14px;
        max-width: 460px;
        margin: 0 auto;
      }
      .stamp {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        color: #444;
        font-size: 0.78rem;
        margin-bottom: 10px;
      }
      .author {
        letter-spacing: 0.08em;
        text-transform: uppercase;
        font-size: 0.82rem;
      }
      .entry-media {
        border: 2px solid #000;
        background: #ddd;
        margin-bottom: 10px;
      }
      .entry-media img {
        display: block;
        width: 100%;
      }
      .entry-text {
        margin: 0;
        white-space: pre-wrap;
        word-break: break-word;
        font-size: 0.98rem;
      }
    `, { raw: true });

    const PostPreview = ({ entry, getAsset }) => {
      const author = entry.getIn(['data', 'author']) || '';
      const text = entry.getIn(['data', 'text']) || '';
      const image = entry.getIn(['data', 'image']) || '';
      const createdAt = entry.getIn(['data', 'createdAt']) || '';

      let timeStr = '';
      if (createdAt) {
        const d = new Date(createdAt);
        if (!isNaN(d.getTime())) {
          let hr = d.getHours();
          const label = hr < 12 ? '午前' : '午後';
          hr = hr % 12 || 12;
          timeStr = `${label}${hr}時`;
        }
      }

      const asset = image ? getAsset(image) : null;
      const imageUrl = asset ? (asset.url || asset.toString()) : null;

      return h('div', null,
        h('article', { className: 'bubble' },
          h('div', { className: 'stamp' },
            h('span', { className: 'author' }, author),
            h('span', null, timeStr)
          ),
          imageUrl
            ? h('div', { className: 'entry-media' },
                h('img', { src: imageUrl, alt: '' })
              )
            : null,
          text ? h('p', { className: 'entry-text' }, text) : null
        )
      );
    };

    CMS.registerPreviewTemplate('posts', PostPreview);
    // ────────────────────────────────────────────────────────────────

    CMS.registerEventListener({
      name: "preSave",
      handler: ({ entry }) => {
        try {
          const login = getGithubLogin();
          const author = AUTHOR_MAP[login] || "";
          const nowDate = getJSTDate();
          const nowCreatedAt = getJSTISOString();

          let data = entry.get("data");

          const currentAuthor = data.get("author");
          const currentDate = data.get("date");
          const currentCreatedAt = data.get("createdAt");

          data = data.set("author", author || currentAuthor || "");

          if (isInvalidAutoValue(currentCreatedAt)) {
            data = data.set("createdAt", nowCreatedAt);
          }

          const finalCreatedAt = data.get("createdAt");

          if (isInvalidAutoValue(currentDate)) {
            const derivedDate =
              typeof finalCreatedAt === "string" && finalCreatedAt.length >= 10
                ? finalCreatedAt.slice(0, 10)
                : nowDate;

            data = data.set("date", derivedDate);
          }

          return entry.set("data", data);
        } catch (e) {
          console.error("preSave failed:", e);
          return entry;
        }
      }
    });
  </script>

  <script>
    // ── SP レイアウトパッチ ──────────────────────────────────────────
    if (window.matchMedia('(max-width: 768px)').matches) {

      // 指定要素を含む「横並びflex/gridコンテナ」を見つけ、
      // その要素を含むペインを非表示にして反対側を全幅にする
      function hidePaneContaining(anchor) {
        let node = anchor.parentElement;
        while (node && node.id !== 'nc-root') {
          const parent = node.parentElement;
          if (!parent || parent.id === 'nc-root') break;
          const cs = getComputedStyle(parent);
          const sideBySide =
            (cs.display === 'flex' && cs.flexDirection !== 'column') ||
            (cs.display === 'grid' && cs.gridTemplateColumns.trim().split(/\s+/).length > 1);
          if (sideBySide && parent.children.length >= 2) {
            const hidePane = [...parent.children].find(c => c.contains(anchor));
            const showPane = [...parent.children].find(c => c !== hidePane);
            if (hidePane && showPane && !hidePane.dataset.spHidden) {
              hidePane.dataset.spHidden = '1';
              hidePane.style.setProperty('display', 'none', 'important');
              showPane.style.setProperty('width', '100vw', 'important');
              showPane.style.setProperty('max-width', '100vw', 'important');
              parent.style.setProperty('grid-template-columns', '1fr', 'important');
              parent.style.setProperty('flex-direction', 'column', 'important');
            }
            return;
          }
          node = parent;
        }
      }

      // モーダルコンテナ本体のみ位置・幅を修正（子要素はCSSに任せる）
      function patchModal(modal) {
        if (modal.dataset.spModalPatched) return;
        modal.dataset.spModalPatched = '1';
        modal.style.setProperty('width', '100vw', 'important');
        modal.style.setProperty('max-width', '100vw', 'important');
        modal.style.setProperty('left', '0', 'important');
        modal.style.setProperty('right', '0', 'important');
        modal.style.setProperty('margin', '0', 'important');
        modal.style.setProperty('box-sizing', 'border-box', 'important');
        modal.style.setProperty('overflow-y', 'auto', 'important');
      }

      // "Collections" テキストノードを TreeWalker で効率的に検索
      function findCollectionsLabel(root) {
        const walker = document.createTreeWalker(root, NodeFilter.SHOW_TEXT, null);
        let node;
        while ((node = walker.nextNode())) {
          if (node.textContent.trim() === 'Collections') return node.parentElement;
        }
        return null;
      }

      let pendingMutations = [];
      let rafId = null;

      const observer = new MutationObserver((mutations) => {
        pendingMutations.push(...mutations);
        if (rafId) return;
        rafId = requestAnimationFrame(() => {
          rafId = null;
          const batch = pendingMutations.splice(0);
          const root = document.getElementById('nc-root');
          if (!root) return;

          // 新規追加ノードの中から [role="dialog"] だけを対象にモーダルパッチ
          for (const mutation of batch) {
            for (const node of mutation.addedNodes) {
              if (node.nodeType !== 1) continue;
              if (node.getAttribute('role') === 'dialog') patchModal(node);
              node.querySelectorAll('[role="dialog"]').forEach(patchModal);
            }
          }

          // 一覧画面: Collections サイドバーを非表示
          const collectionsLabel = findCollectionsLabel(root);
          if (collectionsLabel) hidePaneContaining(collectionsLabel);

          // 編集画面: プレビューiframeを含むペインを非表示
          const iframe = root.querySelector('iframe');
          if (iframe && !iframe.dataset.spPatched) {
            iframe.dataset.spPatched = '1';
            hidePaneContaining(iframe);
          }
        });
      });
      observer.observe(document.body, { childList: true, subtree: true });
    }
    // ────────────────────────────────────────────────────────────────
  </script>
</body>
</html>
