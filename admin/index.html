<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin</title>
  <link href="config.yml" type="text/yaml" rel="cms-config-url" />
</head>
<body>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    const AUTHOR_MAP = {
      "kentam1127g": "まつけん",
      "wakako38-dev": "わかこ"
    };

    function getGithubLogin() {
      try {
        const raw = localStorage.getItem("decap-cms-user");
        if (!raw) return "";
        const user = JSON.parse(raw);
        return user?.login || "";
      } catch (e) {
        console.error("failed to read decap-cms-user:", e);
        return "";
      }
    }

    CMS.registerEventListener({
      name: "preSave",
      handler: ({ entry }) => {
        try {
          const login = getGithubLogin();
          console.log("github login:", login);

          const author = AUTHOR_MAP[login] || "";

          // entry.get("data").set(...) だけだと data Map を返してしまうので、
          // entry 全体へ set し直す
          const nextData = entry.get("data").set("author", author);
          return entry.set("data", nextData);
        } catch (e) {
          console.error("author auto set failed:", e);
          return entry;
        }
      }
    });
  </script>
</body>
</html>
