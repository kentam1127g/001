<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin</title>
  <link href="config.yml" type="text/yaml" rel="cms-config-url" />
</head>
<body>

<script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

<script>
  // GitHubユーザー名 → A / B の対応
  const AUTHOR_MAP = {
    "kentam1127g": "A",
    "friend-github-name": "B"
  };

  // 保存直前に author を自動セット
  CMS.registerEventListener({
    name: "preSave",
    handler: ({ entry }) => {
      try {
        const user = JSON.parse(localStorage.getItem("netlify-cms-user") || "{}");
        const login = user?.user_metadata?.full_name || user?.email || "";

        console.log("login user:", user);

        let author = "";

        // GitHub OAuthの場合、emailやnameに入ることがある
        for (const key in AUTHOR_MAP) {
          if (login.includes(key)) {
            author = AUTHOR_MAP[key];
          }
        }

        // fallback（判定できない場合）
        if (!author) author = "A";

        return entry.get("data").set("author", author);

      } catch (e) {
        console.error("author set error:", e);
        return entry;
      }
    }
  });
</script>

</body>
</html>
