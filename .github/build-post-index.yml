name: Build post index

on:
  push:
    branches:
      - main
    paths:
      - "content/posts/*.json"
      - "!content/posts/index.json"
      - "scripts/generate-post-index.mjs"
      - ".github/workflows/build-post-index.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-index:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate index.json
        run: node scripts/generate-post-index.mjs

      - name: Commit and push index.json
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add content/posts/index.json
          git diff --cached --quiet || git commit -m "Update posts index"
          git push