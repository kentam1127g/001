<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>えんぴつだいあろーぐ。</title>
  <meta name="robots" content="index,follow" />
  <meta property="og:title" content="えんぴつだいあろーぐ。" />
  <meta property="og:description" content="なんでもないただの記憶。" />
  <meta property="og:image" content="./images/ogp.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kentam1127g.github.io/001/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="えんぴつだいあろーぐ。" />
  <meta name="twitter:description" content="なんでもないただの記憶。" />
  <meta name="twitter:image" content="./images/ogp.jpg" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/loader.css" />
  <link rel="stylesheet" href="./css/entries.css" />
  <link rel="stylesheet" href="./css/clock.css" />
  <link rel="stylesheet" href="./css/modal.css" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="title">
        <h1>なんでもないただの記憶。</h1>
        <!--<p>なんでもないただの記憶。</p>-->
      </div>
      <div id="topbarClock" class="topbar-clock">--:--:--</div>
    </div>
  </div>

  <main class="wrap">
    <section class="intro-card">
      <p style="font-size: 0.98rem;">
        はじまり。
      </p>
    </section>

    <div id="loadOlderWrap" class="load-older-wrap" hidden>
      <button id="loadOlder">古いログを読む</button>
    </div>

    <section id="entries" class="log-board"></section>

    <div id="loadNewerWrap" class="load-newer-wrap" hidden>
      <button id="loadNewer">新しいログを読む</button>
    </div>

    <p class="footer-note"></p>
  </main>

  <div id="returnLatestWrap" class="return-latest-wrap" hidden>
    <button id="returnLatest" aria-label="今へ戻る（最新の投稿へ戻る）">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <line x1="8" y1="1" x2="8" y2="10" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        <polyline points="4,7 8,11 12,7" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        <line x1="3" y1="14" x2="13" y2="14" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
      </svg>
    </button>
  </div>


  <div id="imageModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="画像拡大">
    <div class="modal-box">
      <div class="modal-header">
        <div style="display:flex; align-items:baseline; gap:8px; overflow:hidden;">
          <span class="modal-title" id="imageModalTitle"></span>
          <div class="image-modal-author">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>
            <span id="imageModalAuthor"></span>
          </div>
        </div>
        <button id="imageModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="image-modal-loader hidden" id="imageModalLoader">
          <div class="img-reveal-overlay"></div>
        </div>
        <img id="imageModalImg" src="" alt="" />
      </div>
    </div>
  </div>

  <div id="reloadModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="reloadModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="reloadModalTitle">更新</h2>
      </div>
      <div class="modal-body">
        <div class="random-modal-loader">
          <div id="reloadPixelLoader" class="pixel-loader">
            <div class="pixel-loader-bar">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="pixel-loader-label">LOADING</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="shareModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="shareModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="shareModalTitle">共有</h2>
      </div>
      <div class="modal-body">
        <div class="random-modal-loader">
          <div id="sharePixelLoader" class="pixel-loader">
            <div class="pixel-loader-bar">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="pixel-loader-label">LOADING</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="randomModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="randomModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="randomModalTitle">ランダム投稿</h2>
      </div>
      <div class="modal-body">
        <div class="random-modal-loader">
          <div id="randomPixelLoader" class="pixel-loader">
            <div class="pixel-loader-bar">
              <span></span><span></span><span></span><span></span><span></span>
            </div>
            <div class="pixel-loader-label">LOADING</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- とは？モーダル -->
  <div id="aboutModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="aboutModalTitle">
    <div class="modal-box">
      <div class="modal-loader hidden" id="aboutModalLoader">
        <div class="pixel-loader">
          <div class="pixel-loader-bar">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="pixel-loader-label">LOADING</div>
        </div>
      </div>
      <div class="modal-header">
        <h2 class="modal-title" id="aboutModalTitle">えんぴつだいあろーぐ。とは</h2>
        <button id="aboutModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p>とりとめのない記憶たちをたれながし。</p>
        <br><br><br><br>
      </div>
    </div>
  </div>

  <!-- 書いてる人モーダル -->
  <div id="writerModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="writerModalTitle">
    <div class="modal-box">
      <div class="modal-loader hidden" id="writerModalLoader">
        <div class="pixel-loader">
          <div class="pixel-loader-bar">
            <span></span><span></span><span></span><span></span><span></span>
          </div>
          <div class="pixel-loader-label">LOADING</div>
        </div>
      </div>
      <div class="modal-header">
        <h2 class="modal-title" id="writerModalTitle">書いてる人</h2>
        <button id="writerModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p><svg class="author-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>わかこ</p>
        <p>在内都住</p>
        <p></p>
        <hr>
        <p><svg class="author-icon" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/></svg>まつけん</p>
        <p>1996年生まれ／都内在住<br>
        割り箸に入ってる爪楊枝がきらい。民主主義みたいで。</p>
      </div>
    </div>
  </div>

  <!-- 新しい投稿モーダル -->
  <div id="newPostsModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="newPostsModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="newPostsModalTitle">お知らせ</h2>
        <button id="newPostsModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p>新しい投稿があります。</p>
        <br><br><br><br>
      </div>
    </div>
  </div>

  <!-- 時計 -->
  <div class="clock-wrap">
    <div class="ticker-bar">
      <div class="ticker-track-wrap">
        <span id="tickerTrack" class="ticker-track">―</span>
      </div>
    </div>
    <div class="clock-inner">
      <span id="clockDate" class="clock clock-date">----.--.--.--</span>
      <div class="clock-btns">
        <button id="floatRandom" class="clock-btn" type="button" aria-label="ランダム" style="font-size:1rem;font-weight:700;line-height:1;">？</button>
        <button id="floatAbout" class="clock-btn" type="button" aria-label="About">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="2" width="16" height="20" rx="1" ry="1"></rect>
            <line x1="8" y1="7" x2="16" y2="7"></line>
            <line x1="8" y1="11" x2="16" y2="11"></line>
            <line x1="8" y1="15" x2="12" y2="15"></line>
            <line x1="4" y1="6" x2="2" y2="6"></line>
            <line x1="4" y1="10" x2="2" y2="10"></line>
            <line x1="4" y1="14" x2="2" y2="14"></line>
          </svg>
        </button>
        <button id="floatWriter" class="clock-btn" type="button" aria-label="Writer">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </button>
      </div>
      <div class="clock-time-wrap">
        <span id="clockTime" class="clock clock-time">--:--:--</span>
        <button id="topbarReload" class="clock-btn" type="button" aria-label="更新">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

<script type="module" src="./js/main.js"></script>
</body>
</html>
