<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Quiet Broadcast / Log Board</title>
  <style>
    :root {
      --bg: #f4f0e8;
      --paper: #fbfaf6;
      --text: #202020;
      --muted: #6f6a62;
      --line: #d7d1c6;
      --max: 460px;
      --device-pad: 18px;
      --shadow: 0 10px 24px rgba(0, 0, 0, 0.05);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: Georgia, "Times New Roman", "Hiragino Mincho ProN", "Yu Mincho", serif;
      line-height: 1.7;
    }

    body {
      min-height: 100vh;
      padding: 18px 0 0;
    }

    img {
      max-width: 100%;
      display: block;
      height: auto;
    }

    button,
    input,
    textarea,
    select {
      font: inherit;
    }

    .wrap {
      width: min(calc(100% - 28px), var(--max));
      margin: 0 auto;
      padding: 24px 0 120px;
    }

    .device-shell {
      width: min(calc(100% - 24px), calc(var(--max) + var(--device-pad) * 2));
      margin: 0 auto;
      padding: 0 var(--device-pad) 18px;
      border: 1px solid rgba(215, 209, 198, 0.95);
      background: rgba(251, 250, 246, 0.56);
      box-shadow: 0 22px 48px rgba(0, 0, 0, 0.08);
      border-radius: 28px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 5;
      backdrop-filter: blur(8px);
      background: rgba(244, 240, 232, 0.82);
      border-bottom: 1px solid rgba(215, 209, 198, 0.85);
      margin-bottom: 20px;
    }

    .topbar-inner {
      width: min(calc(100% - 28px), var(--max));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 12px 0;
    }

    .title {
      min-width: 0;
    }

    .title h1 {
      margin: 0;
      font-size: clamp(1.05rem, 1.5vw, 1.35rem);
      font-weight: 400;
      letter-spacing: 0.03em;
    }

    .title p {
      margin: 2px 0 0;
      font-size: 0.88rem;
      color: var(--muted);
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    button,
    .buttonlike {
      appearance: none;
      border: 1px solid var(--line);
      background: var(--paper);
      color: var(--text);
      padding: 8px 12px;
      text-decoration: none;
      cursor: pointer;
      box-shadow: 0 1px 0 rgba(255,255,255,0.6) inset;
    }

    button:hover,
    .buttonlike:hover {
      background: #ffffff;
    }

    .intro-card {
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 16px 18px;
      margin-bottom: 18px;
    }

    .intro-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .log-board {
      display: grid;
      gap: 12px;
    }

    .entry {
      display: block;
      scroll-margin-top: 84px;
    }

    .entry.is-highlighted .bubble {
      outline: 2px solid rgba(32, 32, 32, 0.28);
      background: #fffdf8;
    }

    .stamp {
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.45;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .bubble {
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 14px;
    }

    .bubble-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      color: var(--muted);
      font-size: 0.82rem;
    }

    .author {
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .kind {
      display: none;
    }

    .entry-text {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.98rem;
    }

    .entry-media {
      margin-top: 10px;
      border: 1px solid var(--line);
      background: #ebe6dc;
    }

    .entry-caption {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.87rem;
    }

    .entry-actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid transparent;
      background: transparent;
      cursor: pointer;
      color: var(--muted);
    }

    .icon-btn:hover {
      background: rgba(0,0,0,0.04);
      border-color: rgba(0,0,0,0.06);
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
    }

    .view-count {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      font-size: 0.68rem;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-radius: 0;
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .view-count.is-bumped {
      animation: bumpCount 1s ease;
    }

    .view-count-plus {
      opacity: 0;
      transform: translateY(2px);
    }

    .view-count.is-bumped .view-count-plus {
      animation: floatPlus 1s ease;
    }

    @keyframes bumpCount {
      0% { transform: scale(1); }
      22% { transform: scale(1.08); }
      100% { transform: scale(1); }
    }

    @keyframes floatPlus {
      0% {
        opacity: 0;
        transform: translateY(4px);
      }
      20% {
        opacity: 1;
        transform: translateY(0);
      }
      100% {
        opacity: 0;
        transform: translateY(-8px);
      }
    }

    .tiny {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .empty {
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      padding: 18px;
      color: var(--muted);
    }

    .panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 9;
      width: min(430px, calc(100vw - 24px));
      max-height: 84vh;
      overflow: auto;
      background: var(--paper);
      border: 1px solid var(--line);
      box-shadow: 0 18px 42px rgba(0,0,0,0.12);
      padding: 16px;
      display: none;
    }

    .panel.open {
      display: block;
    }

    .panel h2 {
      margin: 0 0 12px;
      font-size: 1.06rem;
      font-weight: 400;
    }

    .field {
      display: grid;
      gap: 6px;
      margin-bottom: 12px;
    }

    .field input,
    .field textarea,
    .field select {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--text);
      padding: 9px 10px;
    }

    .field textarea {
      resize: vertical;
      min-height: 120px;
    }

    .panel-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .footer-note {
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.86rem;
      text-align: center;
    }

    .load-older-wrap {
      display: flex;
      justify-content: center;
      margin: 8px 0 18px;
    }

    .load-older-wrap[hidden] {
      display: none;
    }

    .return-latest-wrap {
      display: flex;
      justify-content: center;
      margin: 18px 0 8px;
    }

    .return-latest-wrap[hidden] {
      display: none;
    }

    .clock-wrap {
      position: fixed;
      left: 50%;
      bottom: 16px;
      transform: translateX(-50%);
      z-index: 8;
      pointer-events: none;
    }

    .clock {
      min-width: 180px;
      padding: 8px 14px;
      border: 1px solid var(--line);
      background: rgba(251, 250, 246, 0.9);
      box-shadow: var(--shadow);
      text-align: center;
      font-size: 0.9rem;
      letter-spacing: 0.12em;
      color: var(--muted);
      font-variant-numeric: tabular-nums;
    }

    @media (min-width: 1024px) {
      :root {
        --max: 720px;
      }

      .device-shell {
        border-radius: 32px;
        padding-left: calc(var(--device-pad) * 1.2);
        padding-right: calc(var(--device-pad) * 1.2);
      }
    }

    @media (max-width: 720px) {
      .clock {
        min-width: 156px;
        font-size: 0.82rem;
      }

      .topbar-inner {
        align-items: flex-start;
        flex-direction: column;
      }
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="title">
        <h1>Quiet Broadcast / Log Board</h1>
        <p>古いログほど上に積み重なる、昔の掲示板みたいな小さな記録。</p>
      </div>
      <div class="top-actions">
        <button id="openEditor">投稿する</button>
        <button id="exportJson">JSON書き出し</button>
        <label class="buttonlike" for="importJson">JSON読み込み</label>
        <input id="importJson" type="file" accept="application/json" hidden>
      </div>
    </div>
  </div>

  <main class="wrap">
    <section class="intro-card">
      <p>
        写真でも、文字でも、両方でも。<br>
        検索やカレンダーより、ただ積み重なっていく感じを優先した試作です。
      </p>
    </section>

    <div id="loadOlderWrap" class="load-older-wrap" hidden>
      <button id="loadOlder">かなり昔のログを読み込む</button>
    </div>

    <section id="entries" class="log-board"></section>

    <div id="returnLatestWrap" class="return-latest-wrap" hidden>
      <button id="returnLatest">今へ戻る（最新の投稿へ戻る）</button>
    </div>

    <p class="footer-note">
      保存先はブラウザの localStorage。軽い試作としてそのまま開いて動きます。
    </p>
  </main>

  <div class="clock-wrap" aria-hidden="true">
    <div id="clock" class="clock">----.--.-- --:--:--</div>
  </div>

  <aside id="panel" class="panel" aria-hidden="true">
    <h2>新規投稿</h2>
    <form id="entryForm">
      <input type="hidden" id="entryId" value="">

      <div class="field">
        <label for="entryDate">日付</label>
        <input id="entryDate" name="date" type="date" required>
      </div>

      <div class="field">
        <label for="entryAuthor">投稿者</label>
        <select id="entryAuthor" name="author">
          <option value="A">A</option>
          <option value="B">B</option>
        </select>
      </div>

      <div class="field">
        <label for="entryImage">画像</label>
        <input id="entryImage" name="image" type="file" accept="image/*">
        <div class="tiny">画像は base64 でブラウザ内に保存されます。</div>
      </div>

      <div class="field">
        <label for="entryText">テキスト</label>
        <textarea id="entryText" name="text" maxlength="500" placeholder="写真があればその下に文字が入ります。文字だけの投稿も可。"></textarea>
        <div class="tiny">空でも可。画像だけの投稿もできます。</div>
      </div>

      <div class="field">
        <label for="entryCaption">画像キャプション</label>
        <input id="entryCaption" name="caption" type="text" maxlength="100" placeholder="任意">
      </div>

      <div class="panel-actions">
        <button type="submit">保存</button>
        <button type="button" id="closeEditor">閉じる</button>
        <button type="button" id="seedDemo">サンプル投入</button>
        <button type="button" id="clearAll">全削除</button>
      </div>
    </form>
  </aside>

  <script>
    const STORAGE_KEY = 'quiet-broadcast-board-v2';
    const CONTENT_INDEX_PATH = 'content/posts/index.json';
    const VIEW_STORAGE_KEY = 'quiet-broadcast-board-view-counts-v1';
    const SEEN_STORAGE_KEY = 'quiet-broadcast-board-seen-entries-v1';
    const INITIAL_VISIBLE_COUNT = 12;
    const LOAD_MORE_COUNT = 12;
    const VIEW_COUNT_DELAY_MS = 900;

    const entriesEl = document.getElementById('entries');
    const panel = document.getElementById('panel');
    const form = document.getElementById('entryForm');
    const importJsonInput = document.getElementById('importJson');

    const entryId = document.getElementById('entryId');
    const entryDate = document.getElementById('entryDate');
    const entryAuthor = document.getElementById('entryAuthor');
    const entryText = document.getElementById('entryText');
    const entryImage = document.getElementById('entryImage');
    const entryCaption = document.getElementById('entryCaption');
    const loadOlderWrap = document.getElementById('loadOlderWrap');
    const clockEl = document.getElementById('clock');
    const returnLatestWrap = document.getElementById('returnLatestWrap');

    let visibleEntryCount = INITIAL_VISIBLE_COUNT;
    let anchoredEntryId = null;

    document.getElementById('openEditor').addEventListener('click', openPanel);
    document.getElementById('closeEditor').addEventListener('click', closePanel);
    document.getElementById('exportJson').addEventListener('click', exportJson);
    document.getElementById('seedDemo').addEventListener('click', seedDemo);
    document.getElementById('clearAll').addEventListener('click', clearAll);
    document.getElementById('loadOlder').addEventListener('click', showMoreEntries);
    document.getElementById('returnLatest').addEventListener('click', returnToLatest);
    importJsonInput.addEventListener('change', importJson);
    form.addEventListener('submit', handleSubmit);
    window.addEventListener('hashchange', handleHashChange);

    entryDate.value = new Date().toISOString().slice(0, 10);

    function loadEntries() {
      try {
        const parsed = JSON.parse(localStorage.getItem(STORAGE_KEY));
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    async function loadEntriesFromContent() {
      try {
        const response = await fetch(CONTENT_INDEX_PATH, { cache: 'no-store' });
        if (!response.ok) throw new Error('content index not found');
        const parsed = await response.json();
        return Array.isArray(parsed) ? parsed : [];
      } catch (error) {
        console.warn('content load failed, fallback to localStorage:', error);
        return loadEntries();
      }
    }

    function saveEntries(entries) {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(entries));
      } catch (e) {
        // quota対策：古い投稿から削除して再トライ
        console.warn('Quota exceeded. Pruning old entries...');
        let pruned = [...entries];
        while (pruned.length > 0) {
          pruned.shift(); // 一番古いもの削除
          try {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(pruned));
            alert('容量上限のため古い投稿を削除しました');
            return;
          } catch {}
        }
        alert('保存容量を超えました。これ以上保存できません。');
        throw e;
      }
    }

    function loadViewCounts() {
      try {
        const parsed = JSON.parse(localStorage.getItem(VIEW_STORAGE_KEY));
        return parsed && typeof parsed === 'object' ? parsed : {};
      } catch {
        return {};
      }
    }

    function saveViewCounts(counts) {
      localStorage.setItem(VIEW_STORAGE_KEY, JSON.stringify(counts));
    }

    function loadSeenEntries() {
      try {
        const parsed = JSON.parse(sessionStorage.getItem(SEEN_STORAGE_KEY));
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveSeenEntries(ids) {
      sessionStorage.setItem(SEEN_STORAGE_KEY, JSON.stringify(ids));
    }

    function escapeHtml(str = '') {
      return str
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function formatDate(dateStr, createdAt) {
      if (!dateStr) return '';

      let timePart = '';
      if (createdAt) {
        const d = new Date(createdAt);
        let h = d.getHours();
        const isAM = h < 12;
        const label = isAM ? '午前' : '午後';
        h = h % 12;
        if (h === 0) h = 12;
        timePart = ` ${label}${h}時`;
      }

      return dateStr + timePart;
    }

    function kindLabel(entry) {
      const hasText = !!(entry.text && entry.text.trim());
      const hasImage = !!entry.imageDataUrl;
      if (hasText && hasImage) return 'photo + text';
      if (hasImage) return 'photo';
      if (hasText) return 'text';
      return 'blank';
    }

    function sortedEntries() {
      return [...loadEntries()].sort((a, b) => {
        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
        return a.createdAt - b.createdAt;
      });
    }

    function getVisibleEntries(entries) {
      if (anchoredEntryId) {
        const anchorIndex = entries.findIndex(entry => entry.id === anchoredEntryId);
        if (anchorIndex !== -1) {
          const start = Math.max(anchorIndex - visibleEntryCount + 1, 0);
          return entries.slice(start, anchorIndex + 1);
        }
      }
      return entries.slice(-visibleEntryCount);
    }

    function updateLoadOlderButton(totalCount, visibleCount, entries) {
      const button = document.getElementById('loadOlder');

      if (anchoredEntryId) {
        const anchorIndex = entries.findIndex(entry => entry.id === anchoredEntryId);
        const hiddenOlderCount = anchorIndex === -1 ? 0 : Math.max(anchorIndex - visibleCount + 1, 0);
        loadOlderWrap.hidden = hiddenOlderCount === 0;
        if (button) {
          const nextCount = Math.min(hiddenOlderCount, LOAD_MORE_COUNT);
          button.textContent = hiddenOlderCount > 0
            ? `さらに古いログを ${nextCount} 件読む（あと ${hiddenOlderCount} 件）`
            : 'さらに古いログを読む';
        }
        return;
      }

      const hiddenCount = Math.max(totalCount - visibleCount, 0);
      loadOlderWrap.hidden = hiddenCount === 0;
      if (button) {
        const nextCount = Math.min(hiddenCount, LOAD_MORE_COUNT);
        button.textContent = hiddenCount > 0
          ? `さらに古いログを ${nextCount} 件読む（あと ${hiddenCount} 件）`
          : 'さらに古いログを読む';
      }
    }

    function updateReturnLatestButton() {
      returnLatestWrap.hidden = !anchoredEntryId;
    }

    function scrollToLatest(force = false) {
      if (anchoredEntryId) return;
      if (!force && visibleEntryCount > INITIAL_VISIBLE_COUNT) return;
      requestAnimationFrame(() => {
        window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'auto' });
      });
    }

    function showMoreEntries() {
      const entries = sortedEntries();
      const beforeHeight = document.documentElement.scrollHeight;
      const beforeScrollY = window.scrollY;

      if (anchoredEntryId) {
        const anchorIndex = entries.findIndex(entry => entry.id === anchoredEntryId);
        if (anchorIndex === -1) return;

        const currentStart = Math.max(anchorIndex - visibleEntryCount + 1, 0);
        const nextStart = Math.max(currentStart - LOAD_MORE_COUNT, 0);

        visibleEntryCount = anchorIndex - nextStart + 1;
        render();

        requestAnimationFrame(() => {
          const afterHeight = document.documentElement.scrollHeight;
          window.scrollTo({ top: beforeScrollY + (afterHeight - beforeHeight), behavior: 'auto' });
        });
        return;
      }

      const total = entries.length;
      visibleEntryCount = Math.min(visibleEntryCount + LOAD_MORE_COUNT, total);
      render();

      requestAnimationFrame(() => {
        const afterHeight = document.documentElement.scrollHeight;
        window.scrollTo({ top: beforeScrollY + (afterHeight - beforeHeight), behavior: 'auto' });
      });
    }

    function returnToLatest() {
      anchoredEntryId = null;
      visibleEntryCount = INITIAL_VISIBLE_COUNT;
      if (history.replaceState) {
        history.replaceState(null, '', location.pathname + location.search);
      }
      render();
      scrollToLatest(true);
    }

    function handleHashChange() {
      const hash = window.location.hash;
      if (hash && hash.startsWith('#entry-')) {
        anchoredEntryId = hash.replace('#entry-', '');
        visibleEntryCount = INITIAL_VISIBLE_COUNT;
      } else {
        anchoredEntryId = null;
        visibleEntryCount = INITIAL_VISIBLE_COUNT;
      }
      render();
    }

    async function render() {
      try {
        ensureHashedEntryVisible();
        const entries = [...(await loadEntriesFromContent())].sort((a, b) => {
          if (a.date !== b.date) return a.date < b.date ? -1 : 1;
          return a.createdAt - b.createdAt;
        });

        if (!entries.length) {
          loadOlderWrap.hidden = true;
          returnLatestWrap.hidden = true;
          entriesEl.innerHTML = '<div class="empty">まだログがありません。最初の一枚、最初の一言をどうぞ。</div>';
          return;
        }

        const visibleEntries = getVisibleEntries(entries);
        updateLoadOlderButton(entries.length, visibleEntries.length, entries);
        updateReturnLatestButton();

        entriesEl.innerHTML = visibleEntries.map(entry => {
          const textHtml = entry.text
            ? `<p class="entry-text">${escapeHtml(entry.text)}</p>`
            : '';

          const imageHtml = entry.image || entry.imageDataUrl
            ? `
              <div class="entry-media">
                <img src="${entry.image || entry.imageDataUrl}" alt="${escapeHtml(entry.caption || entry.text || entry.date || 'image')}" />
              </div>
              ${entry.caption ? `<div class="entry-caption">${escapeHtml(entry.caption)}</div>` : ''}
            `
            : '';

          return `
            <article class="entry" id="entry-${entry.id}" data-entry-id="${entry.id}">
              <div class="bubble">
                <div class="stamp">
                  <div>${escapeHtml(formatDate(entry.date, entry.createdAt))}</div>
                </div>
                <div class="bubble-head">
                  <span class="author">${escapeHtml(entry.author || 'A')}</span>
                </div>
                ${imageHtml}
                ${imageHtml && textHtml ? '<div style="height:10px"></div>' : ''}
                ${textHtml}
                <div class="entry-actions">
                  <span class="view-count" data-view-count-id="${entry.id}" aria-label="既読カウント">
                    <span class="view-count-label">既読：</span>
                    <span class="view-count-number">${Number(entry.viewCount || 0)}</span>
                    <span class="view-count-plus">+1</span>
                  </span>
                  <button class="icon-btn" type="button" data-share-id="${entry.id}" aria-label="共有">
                    <svg viewBox="0 0 24 24">
                      <path d="M22 2L11 13"/>
                      <path d="M22 2l-7 20-4-9-9-4z"/>
                    </svg>
                  </button>
                  <button class="icon-btn" type="button" data-edit-id="${entry.id}" aria-label="編集">
                    <svg viewBox="0 0 24 24"><path d="M4 20l4-1 10-10-3-3L5 16l-1 4z"/><path d="M14 6l3 3"/></svg>
                  </button>
                  <button class="icon-btn" type="button" data-delete-id="${entry.id}" aria-label="削除">
                    <svg viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>
                  </button>
                </div>
              </div>
            </article>
          `;
        }).join('');

        bindEntryButtons();
        bindShareButtons();
        setupViewObservers();
        highlightEntryFromHash();
        scrollToLatest();
      } catch (error) {
        console.error('render failed:', error);
        entriesEl.innerHTML = '<div class="empty">表示中にエラーが発生しました。コンソールを確認してください。</div>';
      }
    }

    function bindEntryButtons() {
      document.querySelectorAll('[data-delete-id]').forEach(button => {
        button.addEventListener('click', () => deleteEntry(button.dataset.deleteId));
      });

      document.querySelectorAll('[data-edit-id]').forEach(button => {
        button.addEventListener('click', () => editEntry(button.dataset.editId));
      });
    }

    function bindShareButtons() {
      document.querySelectorAll('[data-share-id]').forEach(button => {
        button.addEventListener('click', () => shareEntry(button.dataset.shareId));
      });
    }

    function shareEntry(id) {
      const entry = loadEntries().find(item => item.id === id);
      if (!entry) return;

      const url = location.origin + location.pathname + '#entry-' + id;
      const shareTitle = `Quiet Broadcast / ${entry.date || ''}`.trim();
      const shareText = shareTitle;

      if (navigator.share) {
        navigator.share({
          title: shareTitle,
          text: shareText,
          url
        }).catch(() => {});
      } else {
        navigator.clipboard.writeText(`${shareTitle}
${url}`).then(() => {
          alert('共有テキストをコピーしました');
        }).catch(() => {
          prompt('この内容をコピーしてください', `${shareTitle}
${url}`);
        });
      }
    }

    function highlightEntryFromHash() {
      document.querySelectorAll('.entry.is-highlighted').forEach(el => {
        el.classList.remove('is-highlighted');
      });

      const hash = window.location.hash;
      if (!hash || !hash.startsWith('#entry-')) return;

      const target = document.querySelector(hash);
      if (!target) return;

      target.classList.add('is-highlighted');
      requestAnimationFrame(() => {
        target.scrollIntoView({ block: 'center', behavior: 'smooth' });
      });
    }

    function ensureHashedEntryVisible() {
      const hash = window.location.hash;
      if (!hash || !hash.startsWith('#entry-')) return;
      const id = hash.replace('#entry-', '');
      const entries = sortedEntries();
      const index = entries.findIndex(item => item.id === id);
      if (index === -1) return;
      anchoredEntryId = id;
      visibleEntryCount = INITIAL_VISIBLE_COUNT;
    }

    function updateOGP() {
      const title = 'Quiet Broadcast';
      const description = '写真でも、文字でも、両方でも。静かに積み重なっていく二人のログ。';
      const image = 'ogp.jpg';

      setMetaProperty('og:title', title);
      setMetaProperty('og:description', description);
      setMetaProperty('og:image', image);
      setMetaProperty('og:type', 'website');
      setMetaProperty('og:url', location.href);
      setMetaName('twitter:card', 'summary_large_image');
      setMetaName('twitter:title', title);
      setMetaName('twitter:description', description);
      setMetaName('twitter:image', image);
    }

    function setMetaProperty(property, content) {
      let meta = document.head.querySelector(`meta[property="${property}"]`);
      if (!meta) {
        meta = document.createElement('meta');
        meta.setAttribute('property', property);
        document.head.appendChild(meta);
      }
      meta.setAttribute('content', content);
    }

    function setMetaName(name, content) {
      let meta = document.head.querySelector(`meta[name="${name}"]`);
      if (!meta) {
        meta = document.createElement('meta');
        meta.setAttribute('name', name);
        document.head.appendChild(meta);
      }
      meta.setAttribute('content', content);
    }

    let viewObserver = null;

    function setupViewObservers() {
      if (!('IntersectionObserver' in window)) return;

      if (viewObserver) {
        viewObserver.disconnect();
      }

      const seenIds = new Set(loadSeenEntries());
      const pendingTimers = new Map();
      viewObserver = new IntersectionObserver((entries) => {
        const counts = loadViewCounts();

        entries.forEach(entry => {
          const target = entry.target;
          const entryIdValue = target.dataset.entryId;
          if (!entryIdValue || seenIds.has(entryIdValue)) return;

          if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
            if (pendingTimers.has(entryIdValue)) return;

            const timerId = window.setTimeout(() => {
              if (seenIds.has(entryIdValue)) return;

              seenIds.add(entryIdValue);
              counts[entryIdValue] = Number(counts[entryIdValue] || 0) + 1;

              const badge = target.querySelector(`[data-view-count-id="${entryIdValue}"]`);
              if (badge) {
                const numberEl = badge.querySelector('.view-count-number');
                if (numberEl) {
                  numberEl.textContent = String(counts[entryIdValue]);
                }
                badge.classList.remove('is-bumped');
                void badge.offsetWidth;
                badge.classList.add('is-bumped');
                setTimeout(() => {
                  badge.classList.remove('is-bumped');
                }, 1000);
              }

              saveViewCounts(counts);
              saveSeenEntries([...seenIds]);
              syncViewCountsToEntries(counts);
              if (viewObserver) {
                viewObserver.unobserve(target);
              }
              pendingTimers.delete(entryIdValue);
            }, VIEW_COUNT_DELAY_MS);

            pendingTimers.set(entryIdValue, timerId);
            return;
          }

          if (pendingTimers.has(entryIdValue)) {
            clearTimeout(pendingTimers.get(entryIdValue));
            pendingTimers.delete(entryIdValue);
          }
        });
      }, {
        threshold: [0.6]
      });

      document.querySelectorAll('.entry[data-entry-id]').forEach(entryEl => {
        const entryIdValue = entryEl.dataset.entryId;
        if (!seenIds.has(entryIdValue)) {
          viewObserver.observe(entryEl);
        }
      });
    }

    function syncViewCountsToEntries(counts) {
      const entries = loadEntries();
      const nextEntries = entries.map(entry => ({
        ...entry,
        viewCount: Number(counts[entry.id] || entry.viewCount || 0)
      }));
      saveEntries(nextEntries);
    }

    function openPanel() {
      panel.classList.add('open');
      panel.setAttribute('aria-hidden', 'false');
    }

    function closePanel() {
      panel.classList.remove('open');
      panel.setAttribute('aria-hidden', 'true');
      resetForm();
    }

    function resetForm() {
      form.reset();
      entryId.value = '';
      entryDate.value = new Date().toISOString().slice(0, 10);
      entryAuthor.value = 'A';
    }

    function readFileAsDataUrl(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve('');
        const reader = new FileReader();
        reader.onload = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    function loadImageElement(src) {
      return new Promise((resolve, reject) => {
        const img = new Image();
        img.onload = () => resolve(img);
        img.onerror = reject;
        img.src = src;
      });
    }

    async function resizeImageForStorage(file) {
      const originalDataUrl = await readFileAsDataUrl(file);
      const image = await loadImageElement(originalDataUrl);

      const maxWidth = 1600;
      const maxHeight = 1600;
      let { width, height } = image;

      const scale = Math.min(maxWidth / width, maxHeight / height, 1);
      const targetWidth = Math.max(1, Math.round(width * scale));
      const targetHeight = Math.max(1, Math.round(height * scale));

      const canvas = document.createElement('canvas');
      canvas.width = targetWidth;
      canvas.height = targetHeight;
      const ctx = canvas.getContext('2d');
      if (!ctx) return originalDataUrl;

      ctx.drawImage(image, 0, 0, targetWidth, targetHeight);

      let quality = 0.86;
      let result = canvas.toDataURL('image/jpeg', quality);

      while (result.length > 1_200_000 && quality > 0.45) {
        quality -= 0.08;
        result = canvas.toDataURL('image/jpeg', quality);
      }

      return result;
    }

    async function handleSubmit(e) {
      e.preventDefault();

      try {
        const entries = loadEntries();
        const existingId = entryId.value;
        const editingEntry = entries.find(item => item.id === existingId);

        const uploadedImage = entryImage.files[0]
          ? await resizeImageForStorage(entryImage.files[0])
          : '';

        const payload = {
          id: existingId || crypto.randomUUID(),
          date: entryDate.value,
          author: entryAuthor.value,
          text: entryText.value.trim(),
          caption: entryCaption.value.trim(),
          imageDataUrl: uploadedImage || editingEntry?.imageDataUrl || '',
          createdAt: editingEntry?.createdAt || Date.now(),
          viewCount: editingEntry?.viewCount || 0
        };

        if (!payload.text && !payload.imageDataUrl) {
          alert('文字か画像のどちらかを入れてください。');
          return;
        }

        let nextEntries;
        if (existingId) {
          nextEntries = entries.map(item => item.id === existingId ? payload : item);
        } else {
          nextEntries = [...entries, payload];
        }

        saveEntries(nextEntries);
        anchoredEntryId = null;
        visibleEntryCount = INITIAL_VISIBLE_COUNT;
        if (history.replaceState) {
          history.replaceState(null, '', location.pathname + location.search);
        }
        closePanel();
        render();
        scrollToLatest(true);
      } catch (error) {
        console.error('handleSubmit failed:', error);
        alert(`投稿の保存に失敗しました。
${error?.message || error}`);
      }
    }

    function deleteEntry(id) {
      const ok = confirm('この投稿を削除しますか？');
      if (!ok) return;
      const nextEntries = loadEntries().filter(item => item.id !== id);
      saveEntries(nextEntries);
      anchoredEntryId = null;
      visibleEntryCount = INITIAL_VISIBLE_COUNT;
      if (history.replaceState) {
        history.replaceState(null, '', location.pathname + location.search);
      }
      render();
      scrollToLatest(true);
    }

    function editEntry(id) {
      const entry = loadEntries().find(item => item.id === id);
      if (!entry) return;
      entryId.value = entry.id;
      entryDate.value = entry.date || '';
      entryAuthor.value = entry.author || 'A';
      entryText.value = entry.text || '';
      entryCaption.value = entry.caption || '';
      openPanel();
    }

    function exportJson() {
      const blob = new Blob([JSON.stringify(loadEntries(), null, 2)], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'quiet-broadcast-board.json';
      a.click();
      URL.revokeObjectURL(url);
    }

    async function importJson(e) {
      const file = e.target.files[0];
      if (!file) return;
      try {
        const text = await file.text();
        const parsed = JSON.parse(text);
        if (!Array.isArray(parsed)) throw new Error('invalid');
        saveEntries(parsed);
        anchoredEntryId = null;
        visibleEntryCount = INITIAL_VISIBLE_COUNT;
        if (history.replaceState) {
          history.replaceState(null, '', location.pathname + location.search);
        }
        render();
        scrollToLatest(true);
        alert('JSONを読み込みました。');
      } catch {
        alert('JSONの読み込みに失敗しました。');
      }
      importJsonInput.value = '';
    }

    function pad(num) {
      return String(num).padStart(2, '0');
    }

    function updateClock() {
      if (!clockEl) return;
      const now = new Date();
      const y = now.getFullYear();
      const m = pad(now.getMonth() + 1);
      const d = pad(now.getDate());
      const h = pad(now.getHours());
      const min = pad(now.getMinutes());
      const s = pad(now.getSeconds());
      clockEl.textContent = `${y}.${m}.${d} ${h}:${min}:${s}`;
    }

    function seedDemo() {
      const now = Date.now();
      const demo = [
        {
          id: crypto.randomUUID(),
          date: '2026-03-14',
          author: 'A',
          text: '帰り道、信号待ちのあいだだけ街が静かだった。',
          caption: '',
          imageDataUrl: '',
          createdAt: now - 3000
        },
        {
          id: crypto.randomUUID(),
          date: '2026-03-15',
          author: 'B',
          text: '今日は写真だけ置いていく、みたいな日があってもいい。',
          caption: '駅前の光',
          imageDataUrl: '',
          createdAt: now - 2000
        },
        {
          id: crypto.randomUUID(),
          date: '2026-03-16',
          author: 'A',
          text: '昔の掲示板みたいに、上へ上へ積もっていく感じ。',
          caption: '',
          imageDataUrl: '',
          createdAt: now - 1000
        }
      ];
      saveEntries(demo);
      anchoredEntryId = null;
      visibleEntryCount = INITIAL_VISIBLE_COUNT;
      if (history.replaceState) {
        history.replaceState(null, '', location.pathname + location.search);
      }
      render();
      scrollToLatest(true);
    }

    if (window.location.hash && window.location.hash.startsWith('#entry-')) {
      anchoredEntryId = window.location.hash.replace('#entry-', '');
      visibleEntryCount = INITIAL_VISIBLE_COUNT;
    }

    updateOGP();
    render();
    scrollToLatest(true);
    updateClock();
    setInterval(updateClock, 1000);
  </script>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
<script>
  if (window.netlifyIdentity) {
    window.netlifyIdentity.on("init", user => {
      if (!user && (location.hash.includes("invite_token=") || location.hash.includes("recovery_token="))) {
        window.netlifyIdentity.open();
      }
    });

    window.netlifyIdentity.on("login", () => {
      document.location.href = "/admin/";
    });

    window.netlifyIdentity.init();
  }
</script>
