<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet" />
  <title>えんぴつだいあろーぐ。</title>
  <meta name="robots" content="index,follow" />
  <meta property="og:title" content="えんぴつだいあろーぐ。" />
  <meta property="og:description" content="なんでもないただの記憶。" />
  <meta property="og:image" content="./images/ogp.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kentam1127g.github.io/001/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="えんぴつだいあろーぐ。" />
  <meta name="twitter:description" content="なんでもないただの記憶。" />
  <meta name="twitter:image" content="./images/ogp.jpg" />
  <style>
    :root {
      --bg: #fff;
      --paper: #fff;
      --text: #000;
      --muted: #444;
      --line: #000;
      --max: 460px;
      --shadow: none;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      background: var(--bg);
      color: var(--text);
      font-family: "Hiragino Kaku Gothic ProN", "Hiragino Sans", "Meiryo", "MS Gothic", sans-serif;
      line-height: 1.7;
    }

    body { min-height: 100vh; visibility: hidden; }
    body.is-ready { visibility: visible; }

    img {
      max-width: 100%;
      display: block;
      height: auto;
    }

    button, a {
      font: inherit;
    }

    .wrap {
      width: min(calc(100% - 28px), var(--max));
      margin: 0 auto;
      padding: 24px 0 60px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 20;
      background: #e8e8e8;
      border-bottom: 2px solid #000;
      margin-bottom: 20px;
    }

    .topbar-inner {
      width: min(calc(100% - 28px), var(--max));
      margin: 0 auto;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 5px 0;
    }

    .title {
      display: flex;
      align-items: baseline;
      gap: 10px;
    }

    .title h1 {
      margin: 0;
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.03em;
      white-space: nowrap;
    }

    .title p {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted);
      white-space: nowrap;
    }

    .topbar-clock {
      display: none;
    }

    .intro-card {
      padding: 4px 0 16px;
      margin-bottom: 0;
    }

    .intro-card p {
      margin: 0;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .load-older-wrap,
    .return-latest-wrap {
      display: flex;
      justify-content: center;
    }

    .load-older-wrap { margin: 8px 0 18px; }
    .return-latest-wrap { margin: 18px 0 8px; }

    .load-older-wrap[hidden],
    .return-latest-wrap[hidden] {
      display: none;
    }

    .log-board {
      display: grid;
      gap: 0;
    }

    .day-divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin: 6px 0 2px;
      color: #000;
      font-size: 0.74rem;
      letter-spacing: 0.06em;
      opacity: 0;
    }

    .day-divider.is-visible {
      animation: cardSlideIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .day-divider::before,
    .day-divider::after {
      content: "";
      height: 1px;
      background: #000;
      flex: 1 1 auto;
    }

    .day-divider span {
      white-space: nowrap;
    }

    .entry {
      display: block;
      scroll-margin-top: 84px;
      opacity: 0;
      transform: translateY(20px);
    }

    .entry.is-visible {
      animation: cardSlideIn 1.1s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .entry.is-highlighted .bubble {
      background: #ffffcc;
    }

    .bubble {
      padding: 14px 0;
      border-bottom: 1px solid #000;
    }

    .stamp {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-size: 0.78rem;
      line-height: 1.45;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .author {
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-size: 0.82rem;
      color: var(--muted);
      flex-shrink: 0;
    }

    .entry-text {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.98rem;
    }

    .entry-media {
      border: 2px solid #000;
      background: #ddd;
    }
    .entry-media img {
      display: block;
      width: 100%;
    }

    .entry-caption {
      margin-top: 8px;
      color: var(--muted);
      font-size: 0.87rem;
    }

    .entry-actions {
      margin-top: 12px;
      display: flex;
      justify-content: flex-end;
      gap: 6px;
      flex-wrap: wrap;
      align-items: center;
    }

    .view-count {
      margin-right: auto;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 0;
      font-size: 0.68rem;
      color: var(--muted);
      background: transparent;
      border: 0;
      border-radius: 0;
      font-variant-numeric: tabular-nums;
      line-height: 1.2;
    }

    .view-count-plus {
      display: none;
    }

    @keyframes cardSlideIn {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .icon-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid #888;
      background: #ddd;
      cursor: pointer;
      color: #000;
    }

    .icon-btn:hover {
      background: #bbb;
      border-color: #000;
    }

    .icon-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
    }

    .empty {
      background: var(--paper);
      border: 2px solid #000;
      padding: 18px;
      color: var(--muted);
    }

    .footer-note {
      margin-top: 22px;
      color: var(--muted);
      font-size: 0.86rem;
      text-align: center;
    }

    .clock-wrap {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 30;
      background: #000;
      border-top: 2px solid #000;
    }

    .clock-inner {
      width: min(calc(100% - 28px), var(--max));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 6px 0;
    }

    .clock {
      font-family: "Share Tech Mono", "Courier New", monospace;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: #fff;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }

    .clock-date {
      opacity: 1;
    }

    .clock-time {
      opacity: 1;
    }

    @media (min-width: 1024px) {
      :root { --max: 500px; }
      .entry-media { max-width: 100%; }
    }

    @media (max-width: 720px) {
      .title p {
        display: none;
      }
    }

    .clock-btns {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .clock-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 28px;
      height: 28px;
      padding: 0;
      border: 1px solid #888;
      background: #ddd;
      cursor: pointer;
      color: #000;
    }

    .clock-btn:hover {
      background: #bbb;
      border-color: #000;
    }

    .clock-btn svg {
      width: 16px;
      height: 16px;
      stroke: currentColor;
      fill: none;
      stroke-width: 1.6;
    }

    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.45);
      z-index: 50;
      align-items: center;
      justify-content: center;
    }

    .modal-overlay.is-open {
      display: flex;
    }

    .modal-box {
      background: var(--paper);
      border: 2px solid #000;
      width: min(calc(100% - 48px), 400px);
      max-height: 80vh;
      overflow-y: auto;
      padding: 20px;
    }

    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
      border-bottom: 1px solid #000;
      padding-bottom: 10px;
    }

    .modal-title {
      margin: 0;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.04em;
    }

    .modal-body {
      font-size: 0.9rem;
      color: var(--muted);
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="title">
        <h1>なんでもないただの記憶。</h1>
        <!--<p>なんでもないただの記憶。</p>-->
      </div>
      <div id="topbarClock" class="topbar-clock">--:--:--</div>
    </div>
  </div>

  <main class="wrap">
    <section class="intro-card">
      <p style="font-size: 0.98rem;">
        はじまり。
      </p>
    </section>

    <div id="loadOlderWrap" class="load-older-wrap" hidden>
      <button id="loadOlder">さらに古いログを読む</button>
    </div>

    <section id="entries" class="log-board"></section>

    <div id="returnLatestWrap" class="return-latest-wrap" hidden>
      <button id="returnLatest">今へ戻る（最新の投稿へ戻る）</button>
    </div>

    <p class="footer-note"></p>
  </main>


  <div id="aboutModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="aboutModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="aboutModalTitle">About</h2>
        <button id="aboutModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">

      <div class="modal-body">
        <p>えんぴつだいあろーぐ。</p>
        <p>わかこ</p>

        <hr>
        <p>まつけん</p>
        <p>都内在住</p>
      </div>
    </div>
  </div>

  <div class="clock-wrap">
    <div class="clock-inner">
      <span id="clockDate" class="clock clock-date">----.--.--.--</span>
      <div class="clock-btns">
        <button id="floatRandom" class="clock-btn" type="button" aria-label="ランダム">
          <svg viewBox="0 0 24 24" stroke-linecap="round">
            <rect x="2" y="2" width="20" height="20" rx="3" ry="3"></rect>
            <circle cx="8"  cy="8"  r="1.3" fill="currentColor" stroke="none"></circle>
            <circle cx="16" cy="8"  r="1.3" fill="currentColor" stroke="none"></circle>
            <circle cx="8"  cy="16" r="1.3" fill="currentColor" stroke="none"></circle>
            <circle cx="16" cy="16" r="1.3" fill="currentColor" stroke="none"></circle>
            <circle cx="12" cy="12" r="1.3" fill="currentColor" stroke="none"></circle>
          </svg>
        </button>
        <button id="floatReload" class="clock-btn" type="button" aria-label="更新">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 4a8 8 0 1 0 7.93 6.93"></path>
            <polyline points="20 2 20 8 14 8"></polyline>
          </svg>
        </button>
        <button id="floatAbout" class="clock-btn" type="button" aria-label="About">
          <svg viewBox="0 0 24 24">
            <rect x="4" y="2" width="16" height="20" rx="1" ry="1"></rect>
            <line x1="8" y1="7" x2="16" y2="7"></line>
            <line x1="8" y1="11" x2="16" y2="11"></line>
            <line x1="8" y1="15" x2="12" y2="15"></line>
            <line x1="4" y1="6" x2="2" y2="6"></line>
            <line x1="4" y1="10" x2="2" y2="10"></line>
            <line x1="4" y1="14" x2="2" y2="14"></line>
          </svg>
        </button>
      </div>
      <span id="clockTime" class="clock clock-time">--:--:--</span>
    </div>
  </div>

<script>
    const CONTENT_INDEX_PATH = './content/posts/index.json';
    const COUNTS_API_BASE = 'https://enpitumark-oath.netlify.app';
    const SEEN_STORAGE_KEY = 'quiet-broadcast-seen-entries-v1';
    const INITIAL_VISIBLE_COUNT = 1;
    const INITIAL_EXTRA_COUNT = 6;
    const LOAD_MORE_COUNT = 10;
    const VIEW_COUNT_DELAY_MS = 900;

    const entriesEl = document.getElementById('entries');
    const loadOlderWrap = document.getElementById('loadOlderWrap');
    const returnLatestWrap = document.getElementById('returnLatestWrap');
    const clockDateEl = document.getElementById('clockDate');
    const clockTimeEl = document.getElementById('clockTime');
    const topbarClockEl = document.getElementById('topbarClock');

    let allEntries = [];
    let sharedCounts = {};
    let countsLoaded = false;
    let visibleEntryCount = INITIAL_VISIBLE_COUNT;
    let anchoredEntryId = null;
    let viewObserver = null;
    let initialScrollDone = false;

    document.getElementById('loadOlder')?.addEventListener('click', showMoreEntries);
    document.getElementById('returnLatest')?.addEventListener('click', returnToLatest);
    window.addEventListener('hashchange', handleHashChange);
    document.getElementById('floatReload')?.addEventListener('click', () => location.reload());

    const aboutModal = document.getElementById('aboutModal');
    document.getElementById('floatAbout')?.addEventListener('click', () => {
      aboutModal?.classList.add('is-open');
    });
    document.getElementById('aboutModalClose')?.addEventListener('click', () => {
      aboutModal?.classList.remove('is-open');
    });
    aboutModal?.addEventListener('click', (e) => {
      if (e.target === aboutModal) aboutModal.classList.remove('is-open');
    });

    document.getElementById('floatRandom')?.addEventListener('click', () => {
      if (!allEntries.length) return;
      const entry = allEntries[Math.floor(Math.random() * allEntries.length)];
      anchoredEntryId = entry.id;
      visibleEntryCount = INITIAL_VISIBLE_COUNT;
      if (history.replaceState) {
        history.replaceState(null, '', `${location.pathname}${location.search}#entry-${entry.id}`);
      }
      render();
    });

    function escapeHtml(str = '') {
      return String(str)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#39;');
    }

    function pad(num) {
      return String(num).padStart(2, '0');
    }

    function updateClock() {
      const now = new Date();
      const timeStr = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      const dateStr = `${now.getFullYear()}.${pad(now.getMonth() + 1)}.${pad(now.getDate())}`;
      if (clockDateEl) clockDateEl.textContent = dateStr;
      if (clockTimeEl) clockTimeEl.textContent = timeStr;
    }

    function normalizeImagePath(path) {
      if (!path) return '';
      if (path.startsWith('/images/')) return `.${path}`;
      return path;
    }

    function formatOnlyTime(createdAt) {
      if (!createdAt) return '';
      const d = new Date(createdAt);
      if (Number.isNaN(d.getTime())) return '';

      let h = d.getHours();
      const label = h < 12 ? '午前' : '午後';
      h = h % 12;
      if (h === 0) h = 12;
      return `${label}${h}時`;
    }

    function parseDateOnly(dateStr, createdAt) {
      if (dateStr) {
        const d = new Date(`${dateStr}T00:00:00+09:00`);
        if (!Number.isNaN(d.getTime())) return d;
      }
      if (createdAt) {
        const d = new Date(createdAt);
        if (!Number.isNaN(d.getTime())) {
          return new Date(d.getFullYear(), d.getMonth(), d.getDate());
        }
      }
      return null;
    }

    function formatDateOnly(date) {
      return `${date.getFullYear()}-${pad(date.getMonth() + 1)}-${pad(date.getDate())}`;
    }

    function enumerateDayLabels(entries) {
      const labels = new Map();
      if (!entries.length) return labels;

      const parsedDates = entries.map((entry) => parseDateOnly(entry.date, entry.createdAt));

      for (let i = 0; i < entries.length; i += 1) {
        const current = parsedDates[i];
        if (!current) continue;

        const prev = i > 0 ? parsedDates[i - 1] : null;
        const days = [];

        if (!prev) {
          days.push(formatDateOnly(current));
        } else {
          const prevStr = formatDateOnly(prev);
          const currentStr = formatDateOnly(current);

          if (prevStr !== currentStr) {
            const cursor = new Date(prev);
            cursor.setDate(cursor.getDate() + 1);

            while (cursor <= current) {
              days.push(formatDateOnly(cursor));
              cursor.setDate(cursor.getDate() + 1);
            }
          }
        }

        if (days.length) {
          labels.set(`before-${entries[i].id}`, days);
        }
      }

      return labels;
    }

    function loadSeenEntries() {
      try {
        const parsed = JSON.parse(localStorage.getItem(SEEN_STORAGE_KEY));
        return Array.isArray(parsed) ? parsed : [];
      } catch {
        return [];
      }
    }

    function saveSeenEntries(ids) {
      localStorage.setItem(SEEN_STORAGE_KEY, JSON.stringify(ids));
    }

    async function loadEntriesFromContent() {
      // JSONのキャッシュを防ぐため、クエリパラメータに現在時刻を付与
      const cacheBuster = `?t=${Date.now()}`;
      const res = await fetch(`${CONTENT_INDEX_PATH}${cacheBuster}`, { cache: 'no-store' });
      if (!res.ok) throw new Error(`Failed to fetch index.json: ${res.status}`);
      const text = await res.text();
      const data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error('index.json is not an array');

      return [...data].sort((a, b) => {
        if (a.date !== b.date) return a.date < b.date ? -1 : 1;
        return new Date(a.createdAt).getTime() - new Date(b.createdAt).getTime();
      });
    }

    async function loadSharedCounts(ids) {
      try {
        if (!ids || !ids.length) return {};
        console.log('[counts] GET start — entries:', ids.length);
        const url = `${COUNTS_API_BASE}/.netlify/functions/counts-get?ids=${encodeURIComponent(ids.join(','))}`;
        const res = await fetch(url, { cache: 'no-store' });
        const text = await res.text();
        console.log('[counts] GET response status:', res.status, '— body:', text);
        if (!res.ok) {
          console.error(`[counts] GET failed: HTTP ${res.status}`, text);
          return {};
        }
        let data;
        try { data = JSON.parse(text); } catch { console.error('[counts] GET: JSON parse error', text); return {}; }
        if (!data || typeof data !== 'object' || Array.isArray(data)) {
          console.error('[counts] GET: unexpected format', data);
          return {};
        }
        return data;
      } catch (error) {
        console.error('[counts] GET failed (network?):', error);
        return {};
      }
    }

    async function bumpSharedCounts(ids) {
      try {
        if (!ids.length) return {};
        console.log('[counts] BUMP start — ids:', ids);

        const url = `${COUNTS_API_BASE}/.netlify/functions/counts-bump?ids=${encodeURIComponent(ids.join(','))}`;
        const res = await fetch(url, { cache: 'no-store' });

        const text = await res.text();
        console.log('[counts] BUMP response status:', res.status, '— body:', text);
        if (!res.ok) {
          console.error(`[counts] BUMP failed: HTTP ${res.status}`, text);
          return {};
        }
        let data;
        try { data = JSON.parse(text); } catch { console.error('[counts] BUMP: JSON parse error', text); return {}; }
        if (!data?.counts || typeof data.counts !== 'object') {
          console.error('[counts] BUMP: unexpected format', data);
          return {};
        }
        console.log('[counts] BUMP ok:', data.counts);
        return data.counts;
      } catch (error) {
        console.error('[counts] BUMP failed (network?):', error);
        return {};
      }
    }

    function getVisibleEntries(entries) {
      if (anchoredEntryId) {
        const anchorIndex = entries.findIndex(entry => entry.id === anchoredEntryId);
        if (anchorIndex !== -1) {
          const start = Math.max(anchorIndex - visibleEntryCount + 1, 0);
          return entries.slice(start, anchorIndex + 1);
        }
      }
      return entries.slice(-visibleEntryCount);
    }

    function updateLoadOlderButton(totalCount, visibleCount, entries) {
      const button = document.getElementById('loadOlder');
      if (!button || !loadOlderWrap) return;

      if (anchoredEntryId) {
        const anchorIndex = entries.findIndex(entry => entry.id === anchoredEntryId);
        const hiddenOlderCount = anchorIndex === -1 ? 0 : Math.max(anchorIndex - visibleCount + 1, 0);
        loadOlderWrap.hidden = hiddenOlderCount === 0;
        const nextCount = Math.min(hiddenOlderCount, LOAD_MORE_COUNT);
        button.textContent = hiddenOlderCount > 0
          ? `さらに古いログを ${nextCount} 件読む（あと ${hiddenOlderCount} 件）`
          : 'さらに古いログを読む';
        return;
      }

      const hiddenCount = Math.max(totalCount - visibleCount, 0);
      loadOlderWrap.hidden = hiddenCount === 0;
      const nextCount = Math.min(hiddenCount, LOAD_MORE_COUNT);
      button.textContent = hiddenCount > 0
        ? `さらに古いログを ${nextCount} 件読む（あと ${hiddenCount} 件）`
        : 'さらに古いログを読む';
    }

    function updateReturnLatestButton() {
      if (returnLatestWrap) {
        returnLatestWrap.hidden = !anchoredEntryId;
      }
    }

    function scrollToLatest(force = false) {
      if (anchoredEntryId) return;
      if (!force && visibleEntryCount > INITIAL_VISIBLE_COUNT) return;

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'auto' });
        });
      });
    }

    function ensureHashedEntryVisible() {
      const hash = window.location.hash;
      if (!hash || !hash.startsWith('#entry-')) return;
      const id = hash.replace('#entry-', '');
      const index = allEntries.findIndex(item => item.id === id);
      if (index === -1) return;
      anchoredEntryId = id;
      visibleEntryCount = INITIAL_VISIBLE_COUNT;
    }

    function highlightEntryFromHash() {
      document.querySelectorAll('.entry.is-highlighted').forEach(el => {
        el.classList.remove('is-highlighted');
      });

      const hash = window.location.hash;
      if (!hash || !hash.startsWith('#entry-')) return;

      const target = document.querySelector(hash);
      if (!target) return;

      target.classList.add('is-highlighted');

      requestAnimationFrame(() => {
        target.scrollIntoView({ block: 'center', behavior: 'smooth' });
      });
    }

    function shareEntry(id) {
      const entry = allEntries.find(item => item.id === id);
      if (!entry) return;

      const url = `${location.origin}${location.pathname}#entry-${id}`;
      const shareTitle = `えんぴつだいあろーぐ。 / ${entry.date || ''}`.trim();
      const shareText = shareTitle;

      if (navigator.share) {
        navigator.share({ title: shareTitle, text: shareText, url }).catch(() => {});
      } else {
        const textToCopy = `${shareTitle}\n${url}`;
        navigator.clipboard.writeText(textToCopy).then(() => {
          alert('共有テキストをコピーしました');
        }).catch(() => {
          prompt('この内容をコピーしてください', textToCopy);
        });
      }
    }

    function bindShareButtons() {
      document.querySelectorAll('[data-share-id]').forEach(button => {
        button.addEventListener('click', () => {
          shareEntry(button.dataset.shareId);
        });
      });
    }

    function syncViewCountsToDOM(entryId, count) {
      const badge = document.querySelector(`[data-view-count-id="${entryId}"]`);
      if (!badge) return;

      const numberEl = badge.querySelector('.view-count-number');
      if (numberEl) numberEl.textContent = String(count);
    }

    function setupViewObservers() {
      if (!('IntersectionObserver' in window)) return;

      if (viewObserver) {
        viewObserver.disconnect();
      }

      const seenIds = new Set(loadSeenEntries());
      console.log('[counts] seenIds on setup:', [...seenIds]);
      const pendingTimers = new Map();

      viewObserver = new IntersectionObserver((entries) => {
        entries.forEach(entry => {
          const target = entry.target;
          const entryIdValue = target.dataset.entryId;
          if (!entryIdValue || seenIds.has(entryIdValue)) return;

          if (entry.isIntersecting && entry.intersectionRatio >= 0.6) {
            if (pendingTimers.has(entryIdValue)) return;

            const timerId = window.setTimeout(async () => {
              if (seenIds.has(entryIdValue)) return;
              console.log('[counts] bump triggered for entry:', entryIdValue);

              seenIds.add(entryIdValue);
              saveSeenEntries([...seenIds]);

              const changed = await bumpSharedCounts([entryIdValue]);
              if (changed && changed[entryIdValue] != null) {
                sharedCounts[entryIdValue] = Number(changed[entryIdValue]);
                syncViewCountsToDOM(entryIdValue, sharedCounts[entryIdValue]);
              }

              if (viewObserver) {
                viewObserver.unobserve(target);
              }

              pendingTimers.delete(entryIdValue);
            }, VIEW_COUNT_DELAY_MS);

            pendingTimers.set(entryIdValue, timerId);
            return;
          }

          if (pendingTimers.has(entryIdValue)) {
            clearTimeout(pendingTimers.get(entryIdValue));
            pendingTimers.delete(entryIdValue);
          }
        });
      }, {
        threshold: [0.6]
      });

      document.querySelectorAll('.entry[data-entry-id]').forEach(entryEl => {
        const entryIdValue = entryEl.dataset.entryId;
        if (!seenIds.has(entryIdValue)) {
          viewObserver.observe(entryEl);
        }
      });
    }

    function animateEntriesInOrder() {
      const nodes = [...document.querySelectorAll('.entry, .day-divider')];
      if (!nodes.length) return;

      const newestFirst = [...nodes].reverse();

      newestFirst.forEach((node, index) => {
        node.classList.remove('is-visible');
        const delay = index * 280;
        window.setTimeout(() => {
          node.classList.add('is-visible');
        }, delay);
      });
    }

    function showMoreEntries() {
      const beforeHeight = document.documentElement.scrollHeight;
      const beforeScrollY = window.scrollY;

      if (anchoredEntryId) {
        const anchorIndex = allEntries.findIndex(entry => entry.id === anchoredEntryId);
        if (anchorIndex === -1) return;

        const currentStart = Math.max(anchorIndex - visibleEntryCount + 1, 0);
        const nextStart = Math.max(currentStart - LOAD_MORE_COUNT, 0);
        visibleEntryCount = anchorIndex - nextStart + 1;

        render();

        requestAnimationFrame(() => {
          const afterHeight = document.documentElement.scrollHeight;
          window.scrollTo({
            top: beforeScrollY + (afterHeight - beforeHeight),
            behavior: 'auto'
          });
        });
        return;
      }

      const total = allEntries.length;
      visibleEntryCount = Math.min(visibleEntryCount + LOAD_MORE_COUNT, total);

      render();

      requestAnimationFrame(() => {
        const afterHeight = document.documentElement.scrollHeight;
        window.scrollTo({
          top: beforeScrollY + (afterHeight - beforeHeight),
          behavior: 'auto'
        });
      });
    }

    function returnToLatest() {
      anchoredEntryId = null;
      visibleEntryCount = INITIAL_VISIBLE_COUNT;

      if (history.replaceState) {
        history.replaceState(null, '', location.pathname + location.search);
      }

      render();
      scrollToLatest(true);
    }

    function handleHashChange() {
      const hash = window.location.hash;
      if (hash && hash.startsWith('#entry-')) {
        anchoredEntryId = hash.replace('#entry-', '');
        visibleEntryCount = INITIAL_VISIBLE_COUNT;
      } else {
        anchoredEntryId = null;
        visibleEntryCount = INITIAL_VISIBLE_COUNT;
      }
      render();
    }

    function render() {
      try {
        ensureHashedEntryVisible();

        if (!allEntries.length) {
          if (loadOlderWrap) loadOlderWrap.hidden = true;
          if (returnLatestWrap) returnLatestWrap.hidden = true;
          entriesEl.innerHTML = '<div class="empty">まだ投稿がありません。</div>';
          return;
        }

        const visibleEntries = getVisibleEntries(allEntries);
        const dayLabels = enumerateDayLabels(allEntries);
        updateLoadOlderButton(allEntries.length, visibleEntries.length, allEntries);
        updateReturnLatestButton();

        const htmlParts = [];

        visibleEntries.forEach((entry) => {
          const labels = dayLabels.get(`before-${entry.id}`) || [];
          labels.forEach((label) => {
            htmlParts.push(`
              <div class="day-divider">
                <span>${escapeHtml(label)}</span>
              </div>
            `);
          });

          const imageSrc = normalizeImagePath(entry.image || '');
          const imageHtml = imageSrc
            ? `
              <div class="entry-media">
                <img src="${escapeHtml(imageSrc)}" alt="${escapeHtml(entry.caption || entry.text || entry.date || 'image')}" />
              </div>
              ${entry.caption ? `<div class="entry-caption">${escapeHtml(entry.caption)}</div>` : ''}
            `
            : '';

          const textHtml = entry.text
            ? `<p class="entry-text">${escapeHtml(entry.text)}</p>`
            : '';

          const sharedCount = sharedCounts[entry.id];
          const displayCount = countsLoaded ? (sharedCount !== undefined ? sharedCount : 0) : '';

          htmlParts.push(`
            <article class="entry" id="entry-${escapeHtml(entry.id)}" data-entry-id="${escapeHtml(entry.id)}">
              <div class="bubble">
                <div class="stamp">
                  <span class="author">${escapeHtml(entry.author || '')}</span>
                  <span>${escapeHtml(formatOnlyTime(entry.createdAt))}</span>
                </div>

                ${imageHtml}
                ${imageHtml && textHtml ? '<div style="height:10px"></div>' : ''}
                ${textHtml}

                <div class="entry-actions">
                  <span class="view-count" data-view-count-id="${escapeHtml(entry.id)}" aria-label="既読カウント">
                    <span class="view-count-label">既読：</span>
                    <span class="view-count-number">${displayCount}</span>
                    <span class="view-count-plus">+1</span>
                  </span>

                  <button class="icon-btn" type="button" data-share-id="${escapeHtml(entry.id)}" aria-label="共有">
                    <svg viewBox="0 0 24 24">
                      <path d="M22 2L11 13"></path>
                      <path d="M22 2l-7 20-4-9-9-4z"></path>
                    </svg>
                  </button>
                </div>
              </div>
            </article>
          `);
        });

        entriesEl.innerHTML = htmlParts.join('');

        bindShareButtons();
        setupViewObservers();
        animateEntriesInOrder();

        if (anchoredEntryId) {
          highlightEntryFromHash();
        } else if (!initialScrollDone) {
          initialScrollDone = true;
          // 初回スクロールは init() で body 表示と一括管理
        } else {
          scrollToLatest();
        }
      } catch (error) {
        console.error('[render] failed:', error);
        entriesEl.innerHTML = '<div class="empty">表示中にエラーが発生しました。コンソールを確認してください。</div>';
      }
    }

    async function init() {
      try {
        updateClock();
        setInterval(updateClock, 1000);

        if (window.location.hash && window.location.hash.startsWith('#entry-')) {
          anchoredEntryId = window.location.hash.replace('#entry-', '');
        }

        allEntries = await loadEntriesFromContent();

        visibleEntryCount = anchoredEntryId
          ? INITIAL_VISIBLE_COUNT + INITIAL_EXTRA_COUNT
          : INITIAL_VISIBLE_COUNT;
        render();

        requestAnimationFrame(() => {
          requestAnimationFrame(() => {
            if (!anchoredEntryId) {
              window.scrollTo({ top: document.documentElement.scrollHeight, behavior: 'instant' });
            }

            document.body.classList.add('is-ready');

            if (!anchoredEntryId && allEntries.length > INITIAL_VISIBLE_COUNT) {
              setTimeout(() => {
                const beforeHeight = document.documentElement.scrollHeight;
                const beforeScrollY = window.scrollY;

                visibleEntryCount = Math.min(INITIAL_VISIBLE_COUNT + INITIAL_EXTRA_COUNT, allEntries.length);
                initialScrollDone = false;
                render();

                requestAnimationFrame(() => {
                  const afterHeight = document.documentElement.scrollHeight;
                  window.scrollTo({
                    top: beforeScrollY + (afterHeight - beforeHeight),
                    behavior: 'auto'
                  });
                });
              }, 80);
            }
          });
        });

        // 既読カウントのバックグラウンド取得（全エントリIDを渡して一括取得）
        {
          const countsPromise = loadSharedCounts(allEntries.map(e => e.id));
          countsPromise.then(counts => {
            console.log('[counts] server data loaded:', counts);
            sharedCounts = counts;
            countsLoaded = true;

            document.querySelectorAll('[data-view-count-id]').forEach(badge => {
              const id = badge.dataset.viewCountId;
              const numberEl = badge.querySelector('.view-count-number');
              if (!numberEl) return;
              const shared = sharedCounts[id];
              numberEl.textContent = String(shared !== undefined ? shared : 0);
            });
          }).catch(err => console.error('[counts] background load failed:', err));
        }
      } catch (error) {
        console.error('[init] failed:', error);
        entriesEl.innerHTML = '<div class="empty">投稿の読み込みに失敗しました。コンソールを確認してください。</div>';
        document.body.classList.add('is-ready');
      }
    }

    init();
  </script>
</body>
