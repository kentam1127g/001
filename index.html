<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>えんぴつだいあろーぐ。</title>
  <meta name="robots" content="index,follow" />
  <meta property="og:title" content="えんぴつだいあろーぐ。" />
  <meta property="og:description" content="なんでもないただの記憶。" />
  <meta property="og:image" content="./images/ogp.jpg" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://kentam1127g.github.io/001/" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="えんぴつだいあろーぐ。" />
  <meta name="twitter:description" content="なんでもないただの記憶。" />
  <meta name="twitter:image" content="./images/ogp.jpg" />
  <link rel="stylesheet" href="./css/base.css" />
  <link rel="stylesheet" href="./css/loader.css" />
  <link rel="stylesheet" href="./css/entries.css" />
  <link rel="stylesheet" href="./css/clock.css" />
  <link rel="stylesheet" href="./css/modal.css" />
  <link rel="stylesheet" href="./css/cms.css" />
</head>
<body>
  <div class="topbar">
    <div class="topbar-inner">
      <div class="title">
        <h1>なんでもないただの記憶。</h1>
        <!--<p>なんでもないただの記憶。</p>-->
      </div>
      <div id="topbarClock" class="topbar-clock">--:--:--</div>
    </div>
  </div>

  <main class="wrap">
    <section class="intro-card">
      <p style="font-size: 0.98rem;">
        はじまり。
      </p>
    </section>

    <div id="loadOlderWrap" class="load-older-wrap" hidden>
      <button id="loadOlder">古いログを読む</button>
    </div>

    <section id="entries" class="log-board"></section>

    <div id="loadNewerWrap" class="load-newer-wrap" hidden>
      <button id="loadNewer">新しいログを読む</button>
    </div>

    <p class="footer-note"></p>
  </main>

  <div id="returnLatestWrap" class="return-latest-wrap" hidden>
    <button id="returnLatest" aria-label="今へ戻る（最新の投稿へ戻る）">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
        <polyline points="3,2 8,7 13,2" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
        <polyline points="3,8 8,13 13,8" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </button>
  </div>


  <div id="imageModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="画像拡大">
    <div class="modal-box">
      <div class="modal-body">
        <button id="imageModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <div class="image-modal-loader hidden" id="imageModalLoader">
          <div class="img-reveal-overlay"></div>
        </div>
        <img id="imageModalImg" src="" alt="" />
      </div>
    </div>
  </div>

  <div id="reloadModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="reloadModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="reloadModalTitle">更新</h2>
      </div>
      <div class="modal-body">
        <div class="random-modal-loader" id="reloadLoaderWrap" data-loader="LOADING"></div>
      </div>
    </div>
  </div>

  <div id="reloadConfirmModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="reloadConfirmTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="reloadConfirmTitle">更新</h2>
      </div>
      <div class="modal-body">
        <p class="modal-confirm-text">更新しますか？</p>
        <div class="modal-actions">
          <button id="reloadConfirmYes" class="modal-btn modal-btn-primary" type="button">はい</button>
          <button id="reloadConfirmNo" class="modal-btn" type="button">いいえ</button>
        </div>
      </div>
    </div>
  </div>

  <div id="shareModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="shareModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="shareModalTitle">共有</h2>
      </div>
      <div class="modal-body">
        <div class="random-modal-loader" id="shareLoaderWrap" data-loader="LOADING"></div>
      </div>
    </div>
  </div>

  <!-- ランダム投稿ローディングモーダル -->
  <div id="randomModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="randomModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="randomModalTitle">ランダム投稿</h2>
      </div>
      <div class="modal-body">
        <div class="random-modal-loader" id="randomLoaderWrap" data-loader="SEARCHING" data-loader-variant="random-special"></div>
      </div>
    </div>
  </div>

  <!-- ランダム投稿プレビューモーダル（タイトルなし） -->
  <div id="randomPreviewModal" class="modal-overlay" role="dialog" aria-modal="true" aria-label="ランダム投稿プレビュー">
    <div class="modal-box">
      <div class="modal-body">
        <button id="randomPreviewClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
        <div id="randomPreview"></div>
        <button id="randomGoToEntry" class="random-go-btn" type="button">投稿に移動</button>
      </div>
    </div>
  </div>

  <div id="returnLatestModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="returnLatestModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="returnLatestModalTitle">最新のポスト</h2>
      </div>
      <div class="modal-body">
        <div class="random-modal-loader" id="returnLatestLoaderWrap" data-loader="LOADING"></div>
      </div>
    </div>
  </div>

  <!-- とは？モーダル -->
  <div id="aboutModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="aboutModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="aboutModalTitle">えんぴつだいあろーぐ。とは</h2>
        <button id="aboutModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="random-modal-loader hidden" id="aboutModalLoader" data-loader="LOADING"></div>
        <div id="aboutModalBody"></div>
        <div class="modal-edit-row admin-only">
          <button id="editAboutBtn" class="icon-btn" type="button" aria-label="Aboutを編集">
            <svg viewBox="0 0 24 24">
              <path d="M8 4.5H6.8A2.8 2.8 0 0 0 4 7.3v9.9A2.8 2.8 0 0 0 6.8 20h9.9a2.8 2.8 0 0 0 2.8-2.8V16"></path>
              <path d="M11.3 14.8l-2.8.4.4-2.8 8.5-8.5a1.8 1.8 0 0 1 2.6 0l.2.2a1.8 1.8 0 0 1 0 2.6z"></path>
              <path d="M16.6 4.7l2.8 2.8"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 書いてる人モーダル -->
  <div id="writerModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="writerModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="writerModalTitle">書いてる人</h2>
        <button id="writerModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="random-modal-loader hidden" id="writerModalLoader" data-loader="LOADING"></div>
        <div id="writerModalBody"></div>
        <div class="modal-login-row">
          <button id="writerLoginBtn" class="modal-login-btn" type="button" aria-label="ログイン" hidden>
            <svg viewBox="0 0 24 24">
              <path d="M10 3H5v18h5"></path>
              <path d="M13 5h6v14h-6"></path>
              <polyline points="11 8 16 12 11 16"></polyline>
              <line x1="3" y1="12" x2="15.5" y2="12"></line>
            </svg>
          </button>
        </div>
        <div class="modal-edit-row admin-only">
          <button id="editWriterBtn" class="icon-btn" type="button" aria-label="書いてる人を編集">
            <svg viewBox="0 0 24 24">
              <path d="M8 4.5H6.8A2.8 2.8 0 0 0 4 7.3v9.9A2.8 2.8 0 0 0 6.8 20h9.9a2.8 2.8 0 0 0 2.8-2.8V16"></path>
              <path d="M11.3 14.8l-2.8.4.4-2.8 8.5-8.5a1.8 1.8 0 0 1 2.6 0l.2.2a1.8 1.8 0 0 1 0 2.6z"></path>
              <path d="M16.6 4.7l2.8 2.8"></path>
            </svg>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- 新しい投稿モーダル -->
  <div id="newPostsModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="newPostsModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="newPostsModalTitle">お知らせ</h2>
        <button id="newPostsModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p>新しい投稿があります。</p>
        <br><br><br><br>
      </div>
    </div>
  </div>

  <div id="readerCrossedModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="readerCrossedModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="readerCrossedModalTitle">お知らせ</h2>
        <button id="readerCrossedModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <p>読者とすれ違いました。</p>
        <br><br><br><br>
      </div>
    </div>
  </div>

  <div id="loginModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="loginModalTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="loginModalTitle">管理者ログイン</h2>
        <button id="loginModalClose" class="icon-btn" type="button" aria-label="閉じる">
          <svg viewBox="0 0 24 24">
            <line x1="18" y1="6" x2="6" y2="18"></line>
            <line x1="6" y1="6" x2="18" y2="18"></line>
          </svg>
        </button>
      </div>
      <div class="modal-body">
        <div class="modal-actions">
          <button id="githubLoginBtn" class="modal-btn modal-btn-primary" type="button">GitHubでログイン</button>
        </div>
      </div>
    </div>
  </div>

  <div id="logoutConfirmModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="logoutConfirmTitle">
    <div class="modal-box">
      <div class="modal-header">
        <h2 class="modal-title" id="logoutConfirmTitle">ログアウト</h2>
      </div>
      <div class="modal-body">
        <p class="modal-confirm-text">ログアウトしますか？</p>
        <div class="modal-actions">
          <button id="logoutConfirmYes" class="modal-btn modal-btn-primary" type="button">はい</button>
          <button id="logoutConfirmNo" class="modal-btn" type="button">いいえ</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 時計 -->
  <div class="clock-wrap">
    <div class="ticker-bar">
      <div class="ticker-bar-inner">
        <div class="ticker-track-wrap">
          <span id="tickerTrack" class="ticker-track">―</span>
        </div>
        <button id="loginStatusFloat" class="login-status-float" type="button" hidden>
          <span class="login-status-dot" aria-hidden="true"></span>
          <span class="login-status-text">ログイン中</span>
        </button>
      </div>
    </div>
    <div class="clock-inner">
      <span id="clockDate" class="clock clock-date">----.--.--.--</span>
      <div class="clock-btns">
        <button id="floatRandom" class="clock-btn" type="button" aria-label="ランダム">
          <svg viewBox="0 0 24 24">
            <rect x="4.5" y="4.5" width="15" height="15" rx="2.2" ry="2.2"></rect>
            <circle cx="8.5" cy="8.5" r="0.9" fill="currentColor" stroke="none"></circle>
            <circle cx="12" cy="12" r="0.9" fill="currentColor" stroke="none"></circle>
            <circle cx="15.5" cy="15.5" r="0.9" fill="currentColor" stroke="none"></circle>
          </svg>
        </button>
        <button id="floatAbout" class="clock-btn" type="button" aria-label="About" style="font-size:1rem;font-weight:700;line-height:1;">？</button>
        <button id="floatWriter" class="clock-btn" type="button" aria-label="Writer">
          <svg viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
          </svg>
        </button>
        <button id="floatPost" class="clock-btn admin-only" type="button" aria-label="投稿">
          <svg viewBox="0 0 24 24">
            <path d="M4 20l3.5-.9L18 8.6a2.1 2.1 0 0 0-3-3L4.9 16.1z"></path>
            <path d="M13.8 6.8l3.4 3.4"></path>
            <line x1="17.5" y1="15.8" x2="17.5" y2="22.6"></line>
            <line x1="14.1" y1="19.2" x2="20.9" y2="19.2"></line>
          </svg>
        </button>
      </div>
      <div class="clock-time-wrap">
        <span id="clockTime" class="clock clock-time">--:--:--</span>
        <button id="topbarReload" class="clock-btn" type="button" aria-label="更新">
          <svg viewBox="0 0 24 24" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- CMSモーダル（新規作成 / 編集） -->
  <div id="cmsModal" class="modal-overlay" role="dialog" aria-modal="true" aria-labelledby="cmsModalTitle">
    <div class="modal-box" style="position:relative;">
      <div class="modal-loader hidden" id="cmsLoader" data-loader="SAVING"></div>

      <!-- フォーム画面 -->
        <div id="cmsFormScreen">
          <div class="modal-header">
            <h2 class="modal-title" id="cmsModalTitle">新しい記録</h2>
            <div class="cms-modal-header-actions">
              <div id="cmsAuthorBadge" class="cms-author-badge" hidden>
                <svg class="cms-author-badge-icon" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                  <path d="M12 12c2.7 0 4.8-2.1 4.8-4.8S14.7 2.4 12 2.4 7.2 4.5 7.2 7.2 9.3 12 12 12zm0 2.4c-3.2 0-9.6 1.6-9.6 4.8v2.4h19.2v-2.4c0-3.2-6.4-4.8-9.6-4.8z"/>
                </svg>
                <span id="cmsAuthorName"></span>
              </div>
              <button id="cmsModalClose" class="icon-btn" type="button" aria-label="閉じる">
                <svg viewBox="0 0 24 24">
                  <line x1="18" y1="6" x2="6" y2="18"></line>
                  <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
              </button>
            </div>
          </div>
        <div class="modal-body">
          <div id="cmsField1Label" class="cms-field-label" hidden></div>
          <textarea id="cmsTextarea" class="cms-textarea" placeholder="なんでもないただの記録。" rows="5"></textarea>

          <div id="cmsExtraField" hidden>
            <div id="cmsField2Label" class="cms-field-label"></div>
            <textarea id="cmsTextarea2" class="cms-textarea" rows="4"></textarea>
          </div>

          <div id="cmsImageSection" class="cms-image-section">
            <label id="cmsImageAddLabel" class="cms-image-label" for="cmsImageInput">
              <svg viewBox="0 0 24 24">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <circle cx="8.5" cy="8.5" r="1.5"/>
                <polyline points="21 15 16 10 5 21"/>
              </svg>
              画像を追加
            </label>
            <input type="file" id="cmsImageInput" class="cms-image-input" accept="image/*" />
            <div class="cms-image-preview-wrap" hidden>
              <img id="cmsImagePreview" class="cms-image-preview" src="" alt="" hidden />
              <label id="cmsImageReplaceLabel" class="cms-image-replace" for="cmsImageInput" hidden>画像変更</label>
            </div>
            <button id="cmsImageClear" class="cms-image-clear" type="button" hidden>画像を削除</button>
          </div>

          <div id="cmsStatus" class="cms-status"></div>

          <div class="cms-actions">
            <button id="cmsDeleteBtn" class="cms-btn cms-btn-danger" type="button" hidden>削除</button>
            <button id="cmsSaveBtn" class="cms-btn cms-btn-primary" type="button">投稿する</button>
          </div>
        </div>
      </div>

      <!-- 削除確認画面 -->
      <div id="cmsDeleteScreen" hidden>
        <div class="modal-header">
          <h2 class="modal-title">削除の確認</h2>
        </div>
        <div class="modal-body">
          <p>この記録を削除しますか？<br>この操作は取り消せません。</p>
          <div class="cms-actions">
            <button id="cmsDeleteCancelBtn" class="cms-btn" type="button">キャンセル</button>
            <button id="cmsDeleteConfirmBtn" class="cms-btn cms-btn-danger" type="button">削除する</button>
          </div>
        </div>
      </div>
    </div>
  </div>

<!-- pixel-loaderの雛形。JSがdata-loader属性を持つ要素に注入する -->
<template id="pixelLoaderTpl">
  <div class="pixel-loader">
    <div class="pixel-loader-bar">
      <span></span><span></span><span></span><span></span><span></span>
    </div>
    <div class="pixel-loader-label"></div>
  </div>
</template>

<script type="module" src="./js/main.js"></script>
</body>
</html>
